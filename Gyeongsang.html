<!-- 경상도 페이지 전용 스타일 -->
<style>
    .gyeongsang-region-card {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #f1f5f9;
        background: white;
    }
    .gyeongsang-region-card:active {
        transform: scale(0.96);
        background-color: #fffbeb; /* 경상도의 열정적인 황금빛/베이지 톤 */
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
    }
</style>

<!-- 본문 컨텐츠 영역 -->
<div class="opacity-0 animate-fadeIn">
    <!-- Guide Section -->
    <section class="px-6 py-8">
        <h2 id="gyeongsang-guide-main" class="text-2xl font-black text-slate-900 leading-tight tracking-tight">
            열정과 역사가 살아있는<br>경상도로 오세요!
        </h2>
        <p id="gyeongsang-guide-sub" class="text-slate-500 mt-2 text-sm font-bold">탐험하고 싶은 지역을 선택해 주세요.</p>
    </section>

    <!-- Region Cards Grid -->
    <section class="px-4 grid grid-cols-2 gap-4">
        <!-- 북부 (Andong, Yeongju, Mungyeong) -->
        <div class="gyeongsang-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('북부 퀘스트 준비 중!')">
            <div class="text-3xl mb-2">🎭</div>
            <span id="label-north" class="text-sm font-black text-slate-900">북부</span>
            <p id="desc-north" class="text-[10px] text-slate-400 font-bold mt-1">안동 · 영주 · 문경</p>
        </div>

        <!-- 남부 (Busan, Ulsan, Geoje) -->
        <div class="gyeongsang-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('남부 퀘스트 준비 중!')">
            <div class="text-3xl mb-2">🌊</div>
            <span id="label-south" class="text-sm font-black text-slate-900">남부</span>
            <p id="desc-south" class="text-[10px] text-slate-400 font-bold mt-1">부산 · 울산 · 거제</p>
        </div>

        <!-- 서부 (Jinju, Sacheon, Namhae) -->
        <div class="gyeongsang-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('서부 퀘스트 준비 중!')">
            <div class="text-3xl mb-2">🛶</div>
            <span id="label-west" class="text-sm font-black text-slate-900">서부</span>
            <p id="desc-west" class="text-[10px] text-slate-400 font-bold mt-1">진주 · 사천 · 남해</p>
        </div>

        <!-- 동부 (Gyeongju, Pohang, Daegu) -->
        <div class="gyeongsang-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('동부 퀘스트 준비 중!')">
            <div class="text-3xl mb-2">⛩️</div>
            <span id="label-east" class="text-sm font-black text-slate-900">동부</span>
            <p id="desc-east" class="text-[10px] text-slate-400 font-bold mt-1">경주 · 포항 · 대구</p>
        </div>
    </section>

    <!-- Info Card -->
    <section class="px-5 my-10">
        <div class="bg-amber-500 rounded-3xl p-6 flex items-start gap-4 shadow-xl shadow-amber-100">
            <div class="text-xl bg-white/20 p-2 rounded-xl">💡</div>
            <div>
                <h4 id="gyeongsang-info-title" class="text-sm font-black text-white">경상도 추천 코스</h4>
                <p id="gyeongsang-info-desc" class="text-xs text-amber-50 mt-2 leading-relaxed font-medium">
                    역사 여행을 원하신다면 <span class='font-black underline text-white'>경주</span>와 <span class='font-black underline text-white'>안동</span>을, <br>
                    화려한 야경과 바다는 <span class='font-black underline text-white'>부산</span> 코스를 강력 추천해요!
                </p>
            </div>
        </div>
    </section>
</div>

<script>
    /**
     * 경상도 페이지 전용 다국어 텍스트 업데이트
     */
    (function() {
        const langData = {
            KO: {
                guideMain: "열정과 역사가 살아있는<br>경상도로 오세요!",
                guideSub: "탐험하고 싶은 지역을 선택해 주세요.",
                north: "북부", northDesc: "안동 · 영주 · 문경",
                south: "남부", southDesc: "부산 · 울산 · 거제",
                west: "서부", westDesc: "진주 · 사천 · 남해",
                east: "동부", eastDesc: "경주 · 포항 · 대구",
                infoTitle: "경상도 추천 코스",
                infoDesc: "역사 여행을 원하신다면 <span class='font-black underline text-white'>경주</span>와 <span class='font-black underline text-white'>안동</span>을, 화려한 야경과 바다는 <span class='font-black underline text-white'>부산</span> 코스를 강력 추천해요!"
            },
            EN: {
                guideMain: "Experience history and<br>passion in Gyeongsang!",
                guideSub: "Please select the area you want to explore.",
                north: "North", northDesc: "Andong · Yeongju · Mungyeong",
                south: "South", southDesc: "Busan · Ulsan · Geoje",
                west: "West", westDesc: "Jinju · Sacheon · Namhae",
                east: "East", eastDesc: "Gyeongju · Pohang · Daegu",
                infoTitle: "Recommended Courses",
                infoDesc: "Try <span class='font-black underline text-white'>Gyeongju</span> or <span class='font-black underline text-white'>Andong</span> for history, or explore <span class='font-black underline text-white'>Busan</span> for vibrant nights and sea!"
            },
            JP: {
                guideMain: "情熱と歴史가息づく<br>慶尚道へお越しください！",
                guideSub: "探検したい区域を選択してください。",
                north: "北部", northDesc: "安東 · 栄州 · 聞慶",
                south: "南部", southDesc: "釜山 · 蔚山 · 巨済",
                west: "西部", westDesc: "晋州 · 泗川 · 南海",
                east: "東部", eastDesc: "慶州 · 浦項 · 大邱",
                infoTitle: "おすすめコース",
                infoDesc: "歴史旅行なら <span class='font-black underline text-white'>慶州</span>や <span class='font-black underline text-white'>安東</span>を、華やかな夜景と海は <span class='font-black underline text-white'>釜山</span>コースを強くおすすめします！"
            }
        };

        const currentLang = localStorage.getItem('selectedLang') || 'KO';
        const data = langData[currentLang] || langData.KO;

        // 텍스트 업데이트
        const updates = {
            'gyeongsang-guide-main': data.guideMain,
            'gyeongsang-guide-sub': data.guideSub,
            'label-north': data.north,
            'desc-north': data.northDesc,
            'label-south': data.south,
            'desc-south': data.southDesc,
            'label-west': data.west,
            'desc-west': data.westDesc,
            'label-east': data.east,
            'desc-east': data.eastDesc,
            'gyeongsang-info-title': data.infoTitle,
            'gyeongsang-info-desc': data.infoDesc
        };

        for (const [id, value] of Object.entries(updates)) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = value;
        }
    })();
</script>
