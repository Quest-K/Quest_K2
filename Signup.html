<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }
        .input-field { width: 100%; padding: 1.1rem; border-radius: 1.25rem; border: 1px solid #e2e8f0; background: #F8FAFC; focus-outline: none; font-weight: 700; color: #0A1931; transition: all 0.2s; }
        .input-field:focus { border-color: #1E5128; background: white; box-shadow: 0 0 0 4px rgba(30, 81, 40, 0.05); }
        .label { font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem; display: block; padding-left: 0.5rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.6s ease-out; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col justify-center bg-white shadow-2xl px-8 py-12">
        
        <div class="mb-12 animate-slide-up">
            <h1 class="text-4xl font-900 brand-navy tracking-tighter mb-2">Welcome to <span class="brand-green">MeoGo</span></h1>
            <p class="text-slate-400 font-700">лӘЁн—ҳ???ңмһ‘?ҳкё° ?„н•ң кі„м •??л§Ңл“Ө?ҙліҙ?ёмҡ”.</p>
        </div>

        <form id="signup-form" class="space-y-6 animate-slide-up" style="animation-delay: 0.1s;">
            <div>
                <label class="label">Nickname (?үл„Ө??</label>
                <input type="text" id="nickname" class="input-field" placeholder="ex. MeoGo_Traveler" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label">Gender (?ұлі„)</label>
                    <select id="gender" class="input-field" required>
                        <option value="">?ұлі„ ? нғқ</option>
                        <option value="Male">?Ём„ұ (Male)</option>
                        <option value="Female">?¬м„ұ (Female)</option>
                        <option value="Other">кё°н? (Other)</option>
                    </select>
                </div>
                <div>
                    <label class="label">Birth (м¶ңмғқ?„мӣ”)</label>
                    <input type="month" id="birth" class="input-field" required>
                </div>
            </div>

            <div>
                <label class="label">Country (кө??)</label>
                <select id="country" class="input-field" required>
                    <option value="">кө?? ? нғқ</option>
                    <option value="South Korea">South Korea ?Ү°?Ү·</option>
                    <option value="Japan">Japan ?ҮҜ?Үө</option>
                    <option value="China">China ?ҮЁ?Үі</option>
                    <option value="USA">USA ?Үә?Үё</option>
                    <option value="UK">UK ?Ү¬?Ү§</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div>
                <label class="label">Email Address (?ҙл©”??</label>
                <input type="email" id="email" class="input-field" placeholder="your@email.com" required>
            </div>

            <div class="pt-6">
                <button type="submit" id="submit-btn" class="w-full py-5 bg-brand-navy text-white rounded-[1.5rem] font-900 text-lg shadow-xl shadow-slate-200 active:scale-95 transition-all">?Ңмӣҗк°Җ???„лЈҢ</button>
            </div>
        </form>

        <p class="mt-10 text-center text-slate-400 font-700 text-sm">?ҙл? кі„м •???Ҳмңј? к??? <a href="#" class="brand-green underline">лЎңк·ё??/a></p>
    </div>

    <!-- Toast Component -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#0A1931] text-white px-8 py-4 rounded-2xl font-800 text-sm z-[200] shadow-2xl transition-all duration-300 opacity-0 pointer-events-none transform translate-y-2">
        <span id="toast-msg"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX'; // Using the key from previous turns
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            if (isError) t.classList.replace('bg-[#0A1931]', 'bg-rose-500');
            else t.classList.replace('bg-rose-500', 'bg-[#0A1931]');
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 3000);
        }

        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = 'Creating account...';

            const payload = {
                nickname: document.getElementById('nickname').value,
                gender: document.getElementById('gender').value,
                birth_date: document.getElementById('birth').value,
                country: document.getElementById('country').value,
                email: document.getElementById('email').value,
                member_since: new Date().toISOString()
            };

            try {
                // Save to Supabase (profiles table)
                const { error } = await _supabase.from('user_profiles').upsert([payload], { onConflict: 'email' });
                if (error) throw error;

                // Also save locally for persistence during session
                localStorage.setItem('meogo_user', JSON.stringify(payload));
                
                showToast('?Ңмӣҗк°Җ?…мқҙ ?„лЈҢ?ҳм—Ҳ?өлӢҲ?? ?‘Ҹ');
                setTimeout(() => location.href = 'Index.html', 1500);

            } catch (err) {
                console.error(err);
                showToast('?ӨлҘҳк°Җ л°ңмғқ?ҲмҠө?ҲлӢӨ: ' + err.message, true);
                btn.disabled = false;
                btn.innerText = '?Ңмӣҗк°Җ???„лЈҢ';
            }
        };
    </script>
</body>
</html>
