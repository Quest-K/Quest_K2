<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }

        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .pb-safe { padding-bottom: 100px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">

        <header class="bg-white/95 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <a href="Index.html" class="text-2xl font-900 brand-navy tracking-tighter no-underline">MeoGo</a>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div class="text-[10px] font-800 text-slate-400 uppercase leading-none mb-1">GUEST</div>
                    <div class="text-sm font-900 brand-green">1,250P</div>
                </div>
                <div class="w-9 h-9 rounded-full bg-slate-100 border border-slate-200 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=MeoGo" alt="avatar">
                </div>
            </div>
        </header>

        <main class="flex-grow pb-safe px-6">
            <div class="bg-white/95 backdrop-blur-md py-4 sticky top-[73px] z-[90] border-b border-slate-100 mb-6">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()" class="text-slate-400 hover:text-slate-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <h1 class="text-xl font-900 text-[#0A1931]">žį?Ž™©Ž°Ě</h1>
                    <span id="wish-count" class="ml-auto text-sm font-800 text-slate-400"></span>
                </div>
            </div>

            <div id="wish-list" class="space-y-3"></div>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/98 backdrop-blur-xl border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="Index.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span>ŽĮłžÖė</span></a>
            <a href="Wishlist.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>žį?/span></a>
            <a href="History.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg><span>ÍłįŽ°Ě</span></a>
            <a href="Mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span>ŽßąžĚī</span></a>
        </nav>
    </div>

    <script>
        function getWishlist() {
            try { return JSON.parse(localStorage.getItem('meogo_wishlist') || '[]'); } catch { return []; }
        }
        function saveWishlist(list) { localStorage.setItem('meogo_wishlist', JSON.stringify(list)); }

        function removeFromWish(missionId) {
            let list = getWishlist();
            list = list.filter(w => w.mission_id !== missionId);
            saveWishlist(list);
            renderWishlist();
        }

        function renderWishlist() {
            const list = getWishlist();
            const container = document.getElementById('wish-list');
            const countEl = document.getElementById('wish-count');
            countEl.textContent = list.length > 0 ? list.length + 'Íį? : '';

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center flex flex-col items-center fade-in">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-200 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                        <p class="text-slate-400 font-800 text-lg mb-2">žį?Ž™©Ž°Ě??ŽĻĄžĖī?ąžäĶ?ąŽč§</p>
                        <a href="Mission.html" class="mt-4 bg-brand-green text-white text-sm px-6 py-3 rounded-2xl font-900 shadow-lg inline-block no-underline">ŽĮłžÖė Ž≥īŽü¨ÍįÄÍł?/a>
                    </div>
                `;
                return;
            }

            container.innerHTML = list.map(item => `
                <div class="bg-white rounded-[1.5rem] p-5 border border-slate-100 shadow-sm fade-in">
                    <div class="flex items-start gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-slate-50 text-slate-500 text-[10px] font-800 px-2 py-1 rounded-lg uppercase">${item.category}</span>
                                <span class="text-[10px] text-slate-300 font-700">${item.region}</span>
                            </div>
                            <h4 class="font-900 text-lg text-[#0A1931] leading-tight mb-1">${item.mission_name}</h4>
                        </div>
                        <button onclick="removeFromWish('${item.mission_id}')" class="text-rose-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        window.onload = renderWishlist;
    </script>
</body>
</html>
