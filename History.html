<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }

        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .pb-safe { padding-bottom: 100px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">

        <header class="bg-white/95 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <a href="Index.html" class="text-2xl font-900 brand-navy tracking-tighter no-underline">MeoGo</a>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div class="text-[10px] font-800 text-slate-400 uppercase leading-none mb-1">GUEST</div>
                    <div class="text-sm font-900 brand-green">1,250P</div>
                </div>
                <div class="w-9 h-9 rounded-full bg-slate-100 border border-slate-200 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=MeoGo" alt="avatar">
                </div>
            </div>
        </header>

        <main class="flex-grow pb-safe">
            <div class="bg-white/95 backdrop-blur-md px-5 py-4 sticky top-[73px] z-[90] border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()" class="text-slate-400 hover:text-slate-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <h1 class="text-xl font-900 text-[#0A1931]">미션 완료 기록</h1>
                    <span id="history-count" class="ml-auto text-sm font-800 text-slate-400"></span>
                </div>
            </div>

            <!-- Stats summary -->
            <div id="stats-bar" class="px-5 pt-4 hidden">
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div class="bg-[#F1F8F5] rounded-2xl p-4 text-center">
                        <div class="text-2xl font-900 text-[#1E5128]" id="stat-total">0</div>
                        <div class="text-[10px] font-800 text-slate-500 uppercase mt-1">완료 미션</div>
                    </div>
                    <div class="bg-orange-50 rounded-2xl p-4 text-center">
                        <div class="text-2xl font-900 text-orange-600" id="stat-food">0</div>
                        <div class="text-[10px] font-800 text-slate-500 uppercase mt-1">Food</div>
                    </div>
                    <div class="bg-blue-50 rounded-2xl p-4 text-center">
                        <div class="text-2xl font-900 text-blue-600" id="stat-other">0</div>
                        <div class="text-[10px] font-800 text-slate-500 uppercase mt-1">Others</div>
                    </div>
                </div>
            </div>

            <div class="px-5 pt-2">
                <div id="history-list"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/98 backdrop-blur-xl border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="Index.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span>미션</span></a>
            <a href="Wish.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg><span>찜</span></a>
            <a href="History.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg><span>기록</span></a>
            <a href="mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span>마이</span></a>
        </nav>
    </div>

    <script>
        function getHistory() {
            try { return JSON.parse(localStorage.getItem('meogo_history') || '[]'); } catch { return []; }
        }

        function formatDateTime(iso) {
            const d = new Date(iso);
            const year = d.getFullYear();
            const month = String(d.getMonth()+1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            const hours = String(d.getHours()).padStart(2,'0');
            const minutes = String(d.getMinutes()).padStart(2,'0');
            const seconds = String(d.getSeconds()).padStart(2,'0');

            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            const weekday = weekdays[d.getDay()];

            return year + '.' + month + '.' + day + ' (' + weekday + ') ' + hours + ':' + minutes + ':' + seconds;
        }

        function renderHistory() {
            const list = getHistory().sort(function(a, b) {
                return new Date(b.completed_at) - new Date(a.completed_at);
            });

            const container = document.getElementById('history-list');
            const countEl = document.getElementById('history-count');
            const statsBar = document.getElementById('stats-bar');

            countEl.textContent = list.length > 0 ? list.length + '개' : '';

            if (list.length === 0) {
                statsBar.classList.add('hidden');
                container.innerHTML =
                    '<div class="py-20 text-center flex flex-col items-center fade-in">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-200 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>' +
                        '<p class="text-slate-400 font-800 text-lg mb-2">완료한 미션이 없습니다</p>' +
                        '<p class="text-slate-300 font-600 text-sm">미션 페이지에서 미션을 완료해보세요</p>' +
                        '<a href="Mission.html" class="mt-6 bg-[#1E5128] text-white text-sm px-6 py-3 rounded-2xl font-900 shadow-lg inline-block no-underline">미션 도전하기</a>' +
                    '</div>';
                return;
            }

            // Stats
            statsBar.classList.remove('hidden');
            document.getElementById('stat-total').textContent = list.length;
            var foodCount = list.filter(function(i) { return (i.category || '').toLowerCase() === 'food'; }).length;
            document.getElementById('stat-food').textContent = foodCount;
            document.getElementById('stat-other').textContent = list.length - foodCount;

            container.innerHTML = list.map(function(item, idx) {
                var categoryColors = {
                    'Food': 'bg-orange-50 text-orange-600 border-orange-100',
                    'Nature': 'bg-green-50 text-green-600 border-green-100',
                    'History': 'bg-amber-50 text-amber-600 border-amber-100',
                    'K-Life': 'bg-purple-50 text-purple-600 border-purple-100'
                };
                var colorClass = categoryColors[item.category] || 'bg-slate-50 text-slate-600 border-slate-100';

                var categoryIcons = { 'Food': '🍱', 'Nature': '🏔️', 'History': '📜', 'K-Life': '🏠' };
                var icon = categoryIcons[item.category] || '✅';

                return '<div class="bg-white rounded-[1.5rem] p-5 mb-3 border border-slate-100 shadow-sm fade-in" style="animation-delay: ' + (idx * 0.05) + 's">' +
                    '<div class="flex items-start gap-4">' +
                        '<div class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl shrink-0 ' + colorClass + '">' + icon + '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex items-center gap-2 mb-1">' +
                                '<span class="text-[10px] font-800 px-2 py-0.5 rounded-lg ' + colorClass + ' uppercase">' + (item.category || '') + '</span>' +
                                '<span class="text-[10px] text-slate-400 font-700">' + (item.region || '') + '</span>' +
                            '</div>' +
                            '<h4 class="font-900 text-base text-[#0A1931] leading-tight mb-2 truncate">' + (item.mission_name || '') + '</h4>' +
                            '<div class="flex items-center gap-1.5">' +
                                '<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-[#1E5128]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>' +
                                '<span class="text-xs text-slate-500 font-700">' + formatDateTime(item.completed_at) + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="flex items-center shrink-0">' +
                            '<span class="text-[#1E5128] font-900 text-sm">✓ 완료</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        renderHistory();
    </script>
</body>
</html>
