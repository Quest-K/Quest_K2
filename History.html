    <script>
        const regions = ['?äņ▓┤', '?£ņÜĖ', 'Ļ▓ĮĻĖ░', 'Ļ░ĢņøÉ', 'ņČ®ņ▓Ł', '?äļØ╝', 'Ļ▓Įņāü', '?£ņŻ╝'];
        const categories = ['?äņ▓┤', 'K-Food', 'Nature', 'History', 'K-Life'];
        let activeRegion = '?äņ▓┤', activeCategory = '?äņ▓┤';

        function getHistory() { try { return JSON.parse(localStorage.getItem('meogo_history') || '[]'); } catch { return []; } }
        function renderFilters() {
            document.getElementById('region-filters').innerHTML = regions.map(r => `<button onclick="setRegion('${r}')" class="filter-chip ${activeRegion === r ? 'active' : ''}">${r}</button>`).join('');
            document.getElementById('category-filters').innerHTML = categories.map(c => `<button onclick="setCategory('${c}')" class="filter-chip ${activeCategory === c ? 'active' : ''}">${c}</button>`).join('');
        }
        function setRegion(r) { activeRegion = r; renderFilters(); renderHistory(); }
        function setCategory(c) { activeCategory = c; renderFilters(); renderHistory(); }

        function renderHistory() {
            let list = getHistory();
            if (activeRegion !== '?äņ▓┤') list = list.filter(i => i.region === activeRegion);
            if (activeCategory !== '?äņ▓┤') list = list.filter(i => i.category === activeCategory);

            if (list.length > 0) document.getElementById('stats-dashboard').classList.remove('hidden');
            const listDiv = document.getElementById('history-list');
            if (list.length === 0) { listDiv.innerHTML = `<div class="py-20 text-center font-800 text-slate-400">ņĪ░Ļ▒┤??ļ¦×ļŖö ĻĖ░ļĪØ???åņŖĄ?łļŗż.</div>`; return; }
            listDiv.innerHTML = list.sort((a,b) => new Date(b.completed_at) - new Date(a.completed_at)).map(item => `
                <div class="bg-white rounded-[1.5rem] p-5 border border-slate-100 shadow-sm fade-in mb-3">
                    <div class="flex items-center gap-4">
                        <div class="flex-1">

                                <span class="text-[10px] text-slate-300 font-700">${item.region}</span>
                            </div>
                            <h4 class="font-900 text-base text-[#0A1931] mb-1">${item.mission_name}</h4>
                            <p class="text-[10px] text-slate-400 font-600 italic">?äļŻī?? ${new Date(item.completed_at).toLocaleDateString()}</p>
                        </div>
                        <div class="text-green-500 font-900 text-sm">?äļŻī ?Åå</div>
                    </div>
                </div>
            `).join('');
        }
        window.onload = () => { renderFilters(); renderHistory(); };
    </script>
