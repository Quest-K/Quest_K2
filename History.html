<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pb-safe { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* 통일된 카드 스타일 */
        .history-card {
            background: white;
            border-radius: 2rem;
            padding: 1.25rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .history-card:active { transform: scale(0.98); }
        
        /* 공통 상단바 스타일 */
        .lang-container { position: relative; display: inline-block; }
        .lang-btn {
            background: #f1f5f9;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #e2e8f0;
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: white;
            min-width: 140px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid #f1f5f9;
        }
        .lang-dropdown.show { display: block; }
        .lang-option {
            padding: 0.8rem 1rem;
            font-size: 0.875rem;
            color: #475569;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lang-option:hover { background: #f8fafc; }
        .lang-option.active {
            color: #4f46e5;
            font-weight: bold;
            background: #eef2ff;
        }
        
        /* 하단바 스타일 통일 */
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 0.7rem; 
            color: #94a3b8; 
            font-weight: 600; 
            transition: all 0.2s;
        }
        .nav-item.active { color: #4f46e5; }
        .nav-item:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="max-w-2xl mx-auto min-h-screen pb-safe">
        
        <!-- [고정 상단바] 뒤로가기 버튼 삭제 및 index.html과 완전 통일 -->
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center">
                <h1 class="text-2xl font-black gradient-text tracking-tighter cursor-pointer" onclick="location.href='index.html'">Quest-K</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="lang-container">
                    <button class="lang-btn shadow-sm" onclick="toggleLangDropdown(event)">
                        <span class="text-blue-500">🌐</span>
                        <span id="currentLangDisplay">KO</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    <div id="langDropdown" class="lang-dropdown">
                        <div class="lang-option" data-lang="KO" onclick="changeLanguage('KO')"><span>🇰🇷</span> 한국어</div>
                        <div class="lang-option" data-lang="EN" onclick="changeLanguage('EN')"><span>🇺🇸</span> English</div>
                        <div class="lang-option" data-lang="JP" onclick="changeLanguage('JP')"><span>🇯🇵</span> 日本語</div>
                    </div>
                </div>
                <!-- 알림 및 프로필 아이콘 (Index와 동일하게 유지) -->
                <button class="p-2 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg></button>
                <button class="p-2 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></button>
            </div>
        </header>

        <!-- Journey Summary Section -->
        <main class="px-5 py-8">
            <h2 id="txt-history-title" class="text-2xl font-black text-slate-900 mb-6 italic">My Journey</h2>

            <!-- Overall Stats Card -->
            <div class="bg-indigo-600 rounded-[2.5rem] p-6 text-white mb-8 shadow-xl shadow-indigo-100 relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p id="txt-overall-progress" class="text-indigo-100 text-[10px] font-bold uppercase tracking-widest">전체 진행률</p>
                            <h3 class="text-4xl font-black mt-1">32<span class="text-lg ml-1 opacity-60">%</span></h3>
                        </div>
                        <div class="bg-white/20 p-3 rounded-2xl text-xl">📊</div>
                    </div>
                    <div class="w-full h-2 bg-white/20 rounded-full overflow-hidden mb-2">
                        <div class="h-full bg-white w-1/3 transition-all duration-1000"></div>
                    </div>
                    <p id="txt-overall-desc" class="text-[10px] text-indigo-100 font-medium">총 25개의 미션 중 8개를 완료했습니다.</p>
                </div>
                <div class="absolute right-[-10%] bottom-[-20%] w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            </div>

            <!-- Wishlist -->
            <section class="mb-10">
                <h3 id="txt-wishlist-title" class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">❤️ 찜한 리스트</h3>
                <div class="history-card">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-orange-50 flex items-center justify-center text-xl">🏯</div>
                        <div class="flex-1">
                            <div class="text-sm font-bold text-slate-800">경복궁 한복 인생샷</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-0.5">SEOUL · 버킷리스트</div>
                        </div>
                        <button class="p-2 text-rose-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3c1.74 0 3.285.834 4.312 2.105C13.03 3.834 14.575 3 16.312 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" /></svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Completed History -->
            <section>
                <h3 id="txt-completed-title" class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">✅ 완료 기록</h3>
                <div class="space-y-3">
                    <div class="history-card border-l-4 border-l-green-500">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-green-50 text-green-600 flex items-center justify-center text-xl font-bold">✔️</div>
                            <div class="flex-1">
                                <h4 class="text-sm font-bold text-slate-800">광장시장 빈대떡 먹기</h4>
                                <p class="text-[10px] text-green-600 font-bold uppercase tracking-tight mt-0.5"><span id="txt-completed-date">완료일</span>: 2024-03-15</p>
                            </div>
                        </div>
                    </div>
                    <div class="history-card border-l-4 border-l-green-500">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-green-50 text-green-600 flex items-center justify-center text-xl font-bold">✔️</div>
                            <div class="flex-1">
                                <h4 class="text-sm font-bold text-slate-800">덕수궁 돌담길 산책</h4>
                                <p class="text-[10px] text-green-600 font-bold uppercase tracking-tight mt-0.5"><span id="txt-completed-date2">완료일</span>: 2024-03-10</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- [고정 하단바] index.html 양식과 아이콘 완벽 통일 -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <button class="nav-item" onclick="location.href='index.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span id="nav-home">홈</span>
            </button>
            <button class="nav-item" onclick="location.href='Mission.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                <span id="nav-mission">미션</span>
            </button>
            <button class="nav-item" onclick="location.href='Rank.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                <span id="nav-rank">랭킹</span>
            </button>
            <button class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                <span id="nav-record">기록</span>
            </button>
        </nav>
    </div>

    <script>
        const translations = {
            'KO': { 
                'history-title': 'My Journey',
                'overall-progress': '전체 진행률',
                'overall-desc': '총 25개의 미션 중 8개를 완료했습니다.',
                'wishlist-title': '❤️ 찜한 리스트',
                'completed-title': '✅ 완료 기록',
                'completed-date': '완료일',
                'completed-date2': '완료일',
                'nav-home': '홈', 'nav-mission': '미션', 'nav-rank': '랭킹', 'nav-record': '기록'
            },
            'EN': { 
                'history-title': 'My Journey',
                'overall-progress': 'Overall Progress',
                'overall-desc': 'Completed 8 out of 25 missions.',
                'wishlist-title': '❤️ Wishlist',
                'completed-title': '✅ Completed',
                'completed-date': 'Completed',
                'completed-date2': 'Completed',
                'nav-home': 'Home', 'nav-mission': 'Mission', 'nav-rank': 'Ranking', 'nav-record': 'Record'
            },
            'JP': { 
                'history-title': 'My Journey',
                'overall-progress': '全体進捗',
                'overall-desc': '全25個のミッションのうち8個を完了しました。',
                'wishlist-title': '❤️ お気に入り',
                'completed-title': '✅ 完了記録',
                'completed-date': '完了日',
                'completed-date2': '完了일',
                'nav-home': 'ホーム', 'nav-mission': 'ミッション', 'nav-rank': 'ランキング', 'nav-record': '記録'
            }
        };

        function toggleLangDropdown(e) { 
            e.stopPropagation(); 
            document.getElementById('langDropdown').classList.toggle('show'); 
        }

        function changeLanguage(lang) {
            const display = document.getElementById('currentLangDisplay');
            if (display) display.innerText = lang;
            
            const data = translations[lang];
            Object.keys(data).forEach(key => {
                const el = document.getElementById('txt-' + key) || document.getElementById(key);
                if (el) el.innerText = data[key];
            });
            document.querySelectorAll('.lang-option').forEach(opt => opt.classList.toggle('active', opt.dataset.lang === lang));
            document.getElementById('langDropdown').classList.remove('show');
            localStorage.setItem('selectedLang', lang);
        }

        window.onclick = () => {
            const dropdown = document.getElementById('langDropdown');
            if (dropdown) dropdown.classList.remove('show');
        };
        
        window.onload = () => changeLanguage(localStorage.getItem('selectedLang') || 'KO');
    </script>
</body>
</html>
