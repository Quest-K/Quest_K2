<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Quest - My History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8fafc; }
        .pb-safe { padding-bottom: calc(6rem + env(safe-area-inset-bottom)); }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1rem; border: 1px solid #f1f5f9; }
    </style>
</head>
<body class="text-slate-900">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-safe">
        
        <!-- Header -->
        <header class="bg-white px-6 py-4 flex justify-between items-center border-b border-slate-100 sticky top-0 z-50">
            <h1 class="text-xl font-black text-indigo-600 italic tracking-tighter">K-QUEST</h1>
            <button class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-sm">⚙️</button>
        </header>

        <main class="px-6 py-6">
            <h2 class="text-2xl font-black text-slate-900 mb-6 italic">My Journey</h2>

            <!-- Overall Stats -->
            <div class="bg-indigo-600 rounded-[2.5rem] p-6 text-white mb-8 shadow-xl shadow-indigo-100">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-indigo-100 text-[10px] font-bold uppercase tracking-widest">Overall Progress</p>
                        <h3 class="text-4xl font-black mt-1">32<span class="text-lg ml-1 opacity-60">%</span></h3>
                    </div>
                    <div class="bg-white/20 p-3 rounded-2xl text-xl">📊</div>
                </div>
                <div class="w-full h-2 bg-white/20 rounded-full overflow-hidden mb-2">
                    <div class="h-full bg-white w-1/3"></div>
                </div>
                <p class="text-[10px] text-indigo-100 font-medium">총 25개의 미션 중 8개를 완료했습니다.</p>
            </div>

            <!-- Category Stats -->
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="stat-card">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[11px] font-black">음식</span>
                        <span class="text-[10px] font-bold text-indigo-600">60%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-50 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 w-[60%]"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[11px] font-black">액티비티</span>
                        <span class="text-[10px] font-bold text-indigo-600">15%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-50 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 w-[15%]"></div>
                    </div>
                </div>
            </div>

            <!-- Wishlist Section -->
            <section class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-black text-slate-900 flex items-center gap-2">❤️ 찜한 리스트</h3>
                </div>
                <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100 mb-3">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center">🏯</div>
                        <div class="flex-1 text-sm font-bold">경복궁 한복 인생샷</div>
                        <span class="text-[10px] font-bold text-slate-300">서울</span>
                    </div>
                </div>
            </section>

            <!-- Completed History Section -->
            <section class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-black text-slate-900 flex items-center gap-2">✅ 완료 기록</h3>
                </div>
                <div class="space-y-3">
                    <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">✔️</div>
                        <div class="flex-1">
                            <h4 class="text-sm font-bold">광장시장 빈대떡 먹기</h4>
                            <p class="text-[10px] text-green-600 font-bold">Completed: 2024-03-15</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">✔️</div>
                        <div class="flex-1">
                            <h4 class="text-sm font-bold">덕수궁 돌담길 산책</h4>
                            <p class="text-[10px] text-green-600 font-bold">Completed: 2024-03-10</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-2xl border-t border-slate-100 px-10 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-lg">
            <button onclick="location.href='mission.html'" class="flex flex-col items-center text-slate-300">
                <span class="text-xl">📍</span><span class="text-[10px] font-black mt-1">미션</span>
            </button>
            <button class="flex flex-col items-center text-indigo-600">
                <span class="text-xl">📊</span><span class="text-[10px] font-black mt-1">기록</span>
            </button>
            <button class="flex flex-col items-center text-slate-300">
                <span class="text-xl">⭐</span><span class="text-[10px] font-black mt-1">랭킹</span>
            </button>
            <button class="flex flex-col items-center text-slate-300">
                <span class="text-xl">🎁</span><span class="text-[10px] font-black mt-1">상점</span>
            </button>
        </nav>
    </div>
</body>
</html>
