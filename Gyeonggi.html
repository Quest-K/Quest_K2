<style>
    .gyeonggi-region-card {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #f1f5f9;
        background: white;
    }
    .gyeonggi-region-card:active {
        transform: scale(0.96);
        background-color: #f0fbff;
    }
</style>

<div class="opacity-0 animate-[fadeIn_0.5s_ease-in_forwards]">
    <section class="px-6 py-8">
        <h2 id="gyeonggi-guide-main" class="text-2xl font-black text-slate-900 leading-tight tracking-tight">
            경기도의 숨겨진<br>매력을 찾아보세요!
        </h2>
        <p id="gyeonggi-guide-sub" class="text-slate-500 mt-2 text-sm font-bold">탐험하고 싶은 지역을 선택해 주세요.</p>
    </section>

    <section class="px-4 grid grid-cols-2 gap-4">
        <div class="gyeonggi-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('경기 북부 미션 준비 중!')">
            <div class="text-3xl mb-2">🎡</div>
            <span id="gyeonggi-label-north" class="text-sm font-black text-slate-900">북부</span>
            <p id="gyeonggi-desc-north" class="text-[10px] text-slate-400 font-bold mt-1">고양 · 파주 · 의정부</p>
        </div>

        <div class="gyeonggi-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('경기 남부 미션 준비 중!')">
            <div class="text-3xl mb-2">🏰</div>
            <span id="gyeonggi-label-south" class="text-sm font-black text-slate-900">남부</span>
            <p id="gyeonggi-desc-south" class="text-[10px] text-slate-400 font-bold mt-1">수원 · 용인 · 화성</p>
        </div>

        <div class="gyeonggi-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('경기 서부 미션 준비 중!')">
            <div class="text-3xl mb-2">🌊</div>
            <span id="gyeonggi-label-west" class="text-sm font-black text-slate-900">서부</span>
            <p id="gyeonggi-desc-west" class="text-[10px] text-slate-400 font-bold mt-1">안산 · 안양 · 시흥</p>
        </div>

        <div class="gyeonggi-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('경기 동부 미션 준비 중!')">
            <div class="text-3xl mb-2">🖼️</div>
            <span id="gyeonggi-label-east" class="text-sm font-black text-slate-900">동부</span>
            <p id="gyeonggi-desc-east" class="text-[10px] text-slate-400 font-bold mt-1">가평 · 양평</p>
        </div>
    </section>

    <section class="px-5 mt-10 mb-10">
        <div class="bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-3xl p-6 flex items-start gap-4 shadow-xl">
            <div class="text-xl bg-white/20 p-2 rounded-xl">💡</div>
            <div>
                <h4 id="gyeonggi-info-title" class="text-sm font-black text-white">경기도 추천 코스</h4>
                <p id="gyeonggi-info-desc" class="text-xs text-indigo-50 mt-2 leading-relaxed font-medium">
                    가족 여행이라면 <span class='font-black underline'>수원 화성</span>이나 <span class='font-black underline'>용인 에버랜드</span>를, <br>
                    자연 속 힐링은 <span class='font-black underline'>가평/양평</span> 코스를 추천해요!
                </p>
            </div>
        </div>
    </section>
</div>

<script>
(function() {
    const i18n = {
        KO: {
            guideMain: "경기도의 숨겨진<br>매력을 찾아보세요!",
            guideSub: "탐험하고 싶은 지역을 선택해 주세요.",
            north: "북부", northDesc: "고양 · 파주 · 의정부",
            south: "남부", southDesc: "수원 · 용인 · 화성",
            west: "서부", westDesc: "안산 · 안양 · 시흥",
            east: "동부", eastDesc: "가평 · 양평",
            infoTitle: "경기도 추천 코스",
            infoDesc: "가족 여행이라면 <span class='font-black underline text-white'>수원 화성</span>이나 <span class='font-black underline text-white'>에버랜드</span>를, 자연 속 힐링은 <span class='font-black underline text-white'>가평/양평</span> 코스를 추천해요!"
        },
        EN: {
            guideMain: "Find the hidden<br>charms of Gyeonggi!",
            guideSub: "Please select the area you want to explore.",
            north: "North", northDesc: "Goyang, Paju, Uijeongbu",
            south: "South", southDesc: "Suwon, Yongin, Hwaseong",
            west: "West", westDesc: "Ansan, Anyang, Siheung",
            east: "East", eastDesc: "Gapyeong, Yangpyeong",
            infoTitle: "Recommended Courses",
            infoDesc: "Try <span class='font-black underline text-white'>Suwon Hwaseong</span> or <span class='font-black underline text-white'>Everland</span> for family trips, or heal in <span class='font-black underline text-white'>Gapyeong/Yangpyeong</span>!"
        }
    };

    function applyLanguage() {
        const lang = localStorage.getItem('selectedLang') || 'KO';
        const data = i18n[lang] || i18n.KO;
        
        const updates = {
            'gyeonggi-guide-main': data.guideMain,
            'gyeonggi-guide-sub': data.guideSub,
            'gyeonggi-label-north': data.north,
            'gyeonggi-desc-north': data.northDesc,
            'gyeonggi-label-south': data.south,
            'gyeonggi-desc-south': data.southDesc,
            'gyeonggi-label-west': data.west,
            'gyeonggi-desc-west': data.westDesc,
            'gyeonggi-label-east': data.east,
            'gyeonggi-desc-east': data.eastDesc,
            'gyeonggi-info-title': data.infoTitle,
            'gyeonggi-info-desc': data.infoDesc
        };

        for (const [id, value] of Object.entries(updates)) {
            const el = document.getElementById(id);
            if (el) {
                if (id.includes('main') || id.includes('desc')) el.innerHTML = value;
                else el.innerText = value;
            }
        }
    }

    applyLanguage();
})();
</script>
