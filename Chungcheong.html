<!-- 충청도 페이지 전용 스타일 -->
<style>
    .chungcheong-region-card {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #f1f5f9;
        background: white;
    }
    .chungcheong-region-card:active {
        transform: scale(0.96);
        background-color: #f5f3ff; /* 충청도의 여유로운 보랏빛/연보라 톤 */
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
    }
</style>

<!-- 본문 컨텐츠 영역 -->
<div class="opacity-0 animate-fadeIn">
    <!-- Guide Section -->
    <section class="px-6 py-8">
        <h2 id="chungcheong-guide-main" class="text-2xl font-black text-slate-900 leading-tight tracking-tight">
            여유와 낭만이 있는<br>충청도로 오세요!
        </h2>
        <p id="chungcheong-guide-sub" class="text-slate-500 mt-2 text-sm font-bold">탐험하고 싶은 지역을 선택해 주세요.</p>
    </section>

    <!-- Region Cards Grid -->
    <section class="px-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
        <!-- 충청북도 -->
        <div class="chungcheong-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('충북 미션 준비 중!')">
            <div class="text-3xl mb-2">🌳</div>
            <span id="label-cb" class="text-sm font-black text-slate-900">충청북도</span>
            <p id="desc-cb" class="text-[10px] text-slate-400 font-bold mt-1">청주 · 단양 · 제천</p>
        </div>

        <!-- 충청남도 -->
        <div class="chungcheong-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('충남 미션 준비 중!')">
            <div class="text-3xl mb-2">🏖️</div>
            <span id="label-cn" class="text-sm font-black text-slate-900">충청남도</span>
            <p id="desc-cn" class="text-[10px] text-slate-400 font-bold mt-1">천안 · 태안 · 보령</p>
        </div>

        <!-- 대전 / 세종 -->
        <div class="chungcheong-region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px] sm:col-span-2" onclick="alert('대전/세종 미션 준비 중!')">
            <div class="text-3xl mb-2">🔬</div>
            <span id="label-ds" class="text-sm font-black text-slate-900">대전 / 세종</span>
            <p id="desc-ds" class="text-[10px] text-slate-400 font-bold mt-1">과학의 도시 & 행정수도</p>
        </div>
    </section>

    <!-- Info Card -->
    <section class="px-5 my-10">
        <div class="bg-indigo-600 rounded-3xl p-6 flex items-start gap-4 shadow-xl shadow-indigo-100">
            <div class="text-xl bg-white/20 p-2 rounded-xl">💡</div>
            <div>
                <h4 id="info-title" class="text-sm font-black text-white">추천 테마</h4>
                <p id="info-desc" class="text-xs text-indigo-50 mt-2 leading-relaxed font-medium">
                    자연의 힐링을 원하신다면 <span class='font-black underline text-white'>단양/태안</span>을, <br>
                    도시의 스마트함을 원하신다면 <span class='font-black underline text-white'>대전/세종</span>을 선택해 보세요!
                </p>
            </div>
        </div>
    </section>
</div>

<script>
    /**
     * 충청도 페이지 전용 다국어 텍스트 업데이트
     */
    (function() {
        const langData = {
            KO: {
                guideMain: "여유와 낭만이 있는<br>충청도로 오세요!",
                guideSub: "탐험하고 싶은 지역을 선택해 주세요.",
                cb: "충청북도", cbDesc: "청주 · 단양 · 제천",
                cn: "충청남도", cnDesc: "천안 · 태안 · 보령",
                ds: "대전 / 세종", dsDesc: "과학의 도시 & 행정수도",
                infoTitle: "추천 테마",
                infoDesc: "자연의 힐링을 원하신다면 <span class='font-black underline text-white'>단양/태안</span>을, 도시의 스마트함을 원하신다면 <span class='font-black underline text-white'>대전/세종</span>을 선택해 보세요!"
            },
            EN: {
                guideMain: "Find relaxation and<br>romance in Chungcheong!",
                guideSub: "Please select the area you want to explore.",
                cb: "Chungbuk", cbDesc: "Cheongju · Danyang · Jecheon",
                cn: "Chungnam", cnDesc: "Cheonan · Taean · Boryeong",
                ds: "Daejeon / Sejong", dsDesc: "Science City & Administrative Capital",
                infoTitle: "Recommended Themes",
                infoDesc: "Choose <span class='font-black underline text-white'>Danyang/Taean</span> for nature healing, or <span class='font-black underline text-white'>Daejeon/Sejong</span> for smart city vibes!"
            },
            JP: {
                guideMain: "余裕とロマンがある<br>忠清道へお越しください！",
                guideSub: "探検したい地域を選択してください。",
                cb: "忠清北道", cbDesc: "清州 · 丹陽 · 堤川",
                cn: "忠清南道", cnDesc: "天安 · 泰安 · 保寧",
                ds: "大田 / 世宗", dsDesc: "科学の都市 & 行政首都",
                infoTitle: "おすすめテーマ",
                infoDesc: "自然のヒーリングを求めるなら <span class='font-black underline text-white'>丹陽/泰安</span>을、都市のスマートさを求めるなら <span class='font-black underline text-white'>大田/世宗</span>を選択してみてください！"
            }
        };

        const currentLang = localStorage.getItem('selectedLang') || 'KO';
        const data = langData[currentLang] || langData.KO;

        // 텍스트 업데이트
        const updates = {
            'chungcheong-guide-main': data.guideMain,
            'chungcheong-guide-sub': data.guideSub,
            'label-cb': data.cb,
            'desc-cb': data.cbDesc,
            'label-cn': data.cn,
            'desc-cn': data.cnDesc,
            'label-ds': data.ds,
            'desc-ds': data.dsDesc,
            'info-title': data.infoTitle,
            'info-desc': data.infoDesc
        };

        for (const [id, value] of Object.entries(updates)) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = value;
        }
    })();
</script>
