<div id="quiz-app" class="flex flex-col h-full bg-slate-50 relative overflow-hidden">
    <!-- Progress Indicator -->
    <div class="bg-white p-4 shadow-sm border-b border-slate-100">
        <div class="flex justify-between items-center mb-2">
            <span id="quiz-category" class="text-[10px] font-black px-2 py-0.5 rounded bg-blue-100 text-blue-600 uppercase tracking-wider">Loading...</span>
            <span class="text-xs font-bold text-slate-400">Question <span id="q-current" class="text-slate-900">1</span>/10</span>
        </div>
        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
            <div id="q-progress" class="bg-blue-500 h-full transition-all duration-500 w-0"></div>
        </div>
    </div>

    <!-- Main Quiz Area -->
    <div id="quiz-main" class="flex-1 flex flex-col p-6 overflow-y-auto">
        <div class="mb-8">
            <h2 id="q-text" class="text-xl font-bold text-slate-800 leading-snug">
                준비 중입니다...
            </h2>
        </div>

        <div id="q-options" class="space-y-3">
            <!-- Options generated by JS -->
        </div>
    </div>

    <!-- Feedback Message (Toast) -->
    <div id="feedback" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl font-bold text-white shadow-xl opacity-0 transition-opacity pointer-events-none z-20">
    </div>

    <!-- Result Screen (Hidden by default) -->
    <div id="quiz-result" class="absolute inset-0 bg-white z-30 hidden flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-6 relative">
            <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mx-auto">
                <span class="text-5xl">🎁</span>
            </div>
            <div class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] px-2 py-1 rounded-full font-bold">BONUS</div>
        </div>
        
        <h2 class="text-3xl font-black text-slate-900 mb-2">Mission Clear!</h2>
        <p class="text-slate-500 text-sm mb-8">한국 여행 지수가 상승했습니다!<br>포인트를 획득하세요.</p>

        <div class="w-full bg-slate-50 rounded-3xl p-6 border border-slate-100 mb-8">
            <div class="flex justify-around">
                <div class="text-center border-r border-slate-200 flex-1">
                    <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Score</div>
                    <div id="res-score" class="text-2xl font-black text-slate-800">0/10</div>
                </div>
                <div class="text-center flex-1">
                    <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Points</div>
                    <div id="res-points" class="text-2xl font-black text-blue-600">+0P</div>
                </div>
            </div>
        </div>

        <div class="w-full space-y-3">
            <button onclick="handleReward('double')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span>📺</span> 광고 보고 보상 2배 받기
            </button>
            <button onclick="handleReward('normal')" class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold active:scale-95 transition-transform">
                일반 보상 받기
            </button>
        </div>
        
        <button onclick="location.reload()" class="mt-6 text-xs text-slate-300 underline underline-offset-4">다시 풀기</button>
    </div>
</div>

<script>
    const questions = [
        { cat: 'Food', q: '한국에서 고기를 구운 뒤 마지막에 팬에 밥과 양념을 볶아 먹는 필수 코스는?', opts: ['비빔밥', '볶음밥', '덮밥', '국밥'], ans: 1 },
        { cat: 'K-Life', q: '양머리 수건을 쓰고 식혜를 마시며 쉴 수 있는 한국의 대중 목욕 시설은?', opts: ['노래방', 'PC방', '찜질방', '당구장'], ans: 2 },
        { cat: 'Photo Zone', q: '한복을 입으면 무료 입장이 가능한 서울의 대표적인 조선시대 궁궐은?', opts: ['덕수궁', '창덕궁', '경복궁', '경희궁'], ans: 2 },
        { cat: 'Music', q: 'BTS(방탄소년단) 멤버들의 고향이나 MV 촬영지를 방문하는 여행 테마는?', opts: ['K-팝 순례', '방탄 투어', '아미 캠프', '뮤직 로드'], ans: 1 },
        { cat: 'Activity', q: '서울 한강 공원에서 대여할 수 있는 공공 자전거의 이름은?', opts: ['따릉이', '타슈', '누비자', '씽씽이'], ans: 0 },
        { cat: 'K-Life', q: '한국 편의점에서 "얼음컵"에 부어 마시는 가장 대중적인 파우치 음료는?', opts: ['소주', '우유', '커피', '콜라'], ans: 2 },
        { cat: 'Food', q: '전통 시장인 광장시장에서 "마약김밥"과 함께 꼭 먹어야 하는 고소한 부침 요리는?', opts: ['파전', '김치전', '빈대떡', '호떡'], ans: 2 },
        { cat: 'Photo Zone', q: '싸이(PSY)의 "강남스타일" 말춤 동상이 있는 강남의 랜드마크 건물은?', opts: ['롯데타워', '코엑스', 'N서울타워', 'DDP'], ans: 1 },
        { cat: 'Activity', q: '제주도 바다에서 장비 없이 잠수하여 해산물을 채취하는 전문 여성은?', opts: ['해녀', '어부', '잠수부', '선녀'], ans: 0 },
        { cat: 'K-Life', q: '한국에서 택시를 탔을 때, 요금을 결제하는 가장 일반적인 방법은?', opts: ['현금만 가능', '계좌이체', '신용/교통카드', '물물교환'], ans: 2 }
    ];

    let curIdx = 0;
    let score = 0;
    let isAnswering = false;

    function initQuiz() {
        renderQuestion();
    }

    function renderQuestion() {
        const item = questions[curIdx];
        document.getElementById('q-current').innerText = curIdx + 1;
        document.getElementById('q-progress').style.width = ((curIdx + 1) / questions.length * 100) + '%';
        document.getElementById('quiz-category').innerText = item.cat;
        document.getElementById('q-text').innerText = item.q;

        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';

        item.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "w-full p-4 text-left border-2 border-slate-200 rounded-2xl font-bold text-slate-700 bg-white transition-all duration-200 outline-none";
            btn.innerHTML = `<span class="inline-block w-6 text-slate-300 mr-2">${String.fromCharCode(65 + i)}</span> ${opt}`;
            btn.onclick = () => selectOption(i, btn);
            optionsDiv.appendChild(btn);
        });
        isAnswering = false;
    }

    function selectOption(idx, btn) {
        if (isAnswering) return;
        isAnswering = true;

        const correct = questions[curIdx].ans;
        const feedback = document.getElementById('feedback');

        if (idx === correct) {
            score++;
            btn.classList.replace('border-slate-200', 'border-green-500');
            btn.classList.add('bg-green-50', 'text-green-700');
            showFeedback('Correct! ✨', 'bg-green-500');
        } else {
            btn.classList.replace('border-slate-200', 'border-red-500');
            btn.classList.add('bg-red-50', 'text-red-700');
            showFeedback('Oops! 😢', 'bg-red-500');
        }

        setTimeout(() => {
            curIdx++;
            if (curIdx < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }, 1200);
    }

    function showFeedback(text, colorClass) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl font-bold text-white shadow-xl transition-opacity pointer-events-none z-20 ${colorClass} opacity-100`;
        setTimeout(() => fb.style.opacity = '0', 800);
    }

    function showResult() {
        document.getElementById('res-score').innerText = `${score}/${questions.length}`;
        document.getElementById('res-points').innerText = `+${score * 10}P`;
        document.getElementById('quiz-result').classList.remove('hidden');
    }

    function handleReward(type) {
        if (type === 'double') {
            alert("광고를 시청합니다... 보상이 2배로 적립됩니다! (+" + (score * 20) + "P)");
        } else {
            alert("일반 보상이 적립되었습니다. (+" + (score * 10) + "P)");
        }
        // 실제 앱에서는 여기서 네이티브 랭킹/데이터 서버로 전송
        location.reload();
    }

    window.onload = initQuiz;
</script>
