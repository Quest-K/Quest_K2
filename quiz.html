<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Quiz Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .quiz-option { background: white; border: 1px solid #f1f5f9; border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.2s; font-weight: 700; color: #475569; position: relative; overflow: hidden; }
        .quiz-option:active { transform: scale(0.98); }
        .quiz-option.correct { background: #F1F8F5; border-color: #1E5128; color: #1E5128; }
        .quiz-option.incorrect { background: #FFF5F5; border-color: #E53E3E; color: #E53E3E; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">
        <header class="bg-white/95 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="p-1 -ml-1 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg></button>
                <h1 class="text-xl font-900 brand-navy" data-quiz-lang="ui-title">лѓЄмЕШ лІИмК§???ім¶И</h1>
            </div>
            <div id="q-progress" class="text-sm font-900 brand-green">1 / 5</div>
        </header>

        <main class="flex-grow p-6">
            <div id="q-loading" class="flex flex-col items-center justify-center py-20 animate-pulse">
                <div class="w-12 h-12 rounded-full border-4 border-[#1E5128] border-t-transparent animate-spin mb-4"></div>
                <p class="text-slate-400 font-800 text-sm" data-quiz-lang="ui-loading">AIк∞А ?ємЛ†???ДнХі ?ім¶Ил•?м§Алє?м§СмЮЕ?ИлЛ§...</p>
            </div>

            <div id="q-container" class="hidden">
                <div class="mb-8">
                    <span id="q-category" class="inline-block px-3 py-1 bg-[#F1F8F5] text-[#1E5128] text-[10px] font-900 rounded-lg uppercase mb-3">CATEGORY</span>
                    <h2 id="q-text" class="text-2xl font-900 brand-navy leading-tight">мІИлђЄ ?імЪ©???ђкЄ∞???ЬмЛЬ?©лЛИ??</h2>
                </div>
                <div id="q-options" class="flex flex-col"></div>
            </div>
        </main>

        <div id="q-feedback" class="fixed inset-0 z-[120] pointer-events-none flex items-center justify-center opacity-0 transition-all duration-300 transform scale-110">
            <span id="q-feedback-icon" class="text-9xl"></span>
        </div>

        <div id="q-result" class="hidden fixed inset-0 bg-white z-[150] flex flex-col items-center justify-center p-8 text-center animate-[fadeIn_0.5s_ease-out]">
            <h3 class="text-3xl font-black text-slate-900 mb-3" data-quiz-lang="res-title">лѓЄмЕШ ?Дл£М!</h3>
            <p class="text-slate-500 mb-10 font-medium leading-relaxed" data-quiz-lang="res-sub">?Ькµ≠ ?ђнЦЙ ?ДлђЄк∞Ал°??Єм†Хл∞ЫмЬЉ?®мКµ?ИлЛ§!</p>
            <div class="w-full bg-slate-50 rounded-3xl p-6 grid grid-cols-2 gap-4 mb-10">
                <div>
                    <p class="text-[10px] font-800 text-slate-400 uppercase mb-1" data-quiz-lang="res-correct">лІЮнЮМ к∞ЬмИШ</p>
                    <p class="text-2xl font-900 brand-navy"><span id="res-score">5</span> / 5</p>
                </div>
                <div>
                    <p class="text-[10px] font-800 text-slate-400 uppercase mb-1" data-quiz-lang="res-reward">?НлУЭ ?ђмЭЄ??/p>
                    <p class="text-2xl font-900 brand-green">+<span id="res-points">500</span>P</p>
                </div>
            </div>
            <button onclick="location.href='Index.html'" class="w-full py-5 bg-brand-navy text-white rounded-2xl font-900 active:scale-95 transition-all" data-quiz-lang="btn-close">?ХмЭЄ л∞??МмХДк∞АкЄ?/button>
        </div>
    </div>

    <script>
        const baseContent = {
            ui: { title: "лѓЄмЕШ лІИмК§???ім¶И", loading: "AIк∞А ?ємЛ†???ДнХі ?ім¶Ил•?м§Алє?м§СмЮЕ?ИлЛ§..." },
            data: [
                { cat: '?МмЛЭ', q: "?Љк≤є?імЭД л®єм? ??л∞•мЭД л≥ґмХД л®єлКФ лђЄнЩФл•?лђімЧЗ?ілЭЉ ?†кєМ??", opts: ["лєДлєФл∞?, "л≥ґмЭМл∞?, "??∞•", "м£Љл®єл∞?], ans: 1 },
                { cat: 'K-?ЉмЭі??, q: "?Сл®Єл¶??Шк±і???∞к≥† ?ЭнШЬ?А лІ•л∞Ш???ђк???м¶РкЄ∞???ік≥≥?А?", opts: ["?ЄлЮШл∞?, "PCл∞?, "м∞ЬмІИл∞?, "лѓЄмЪ©??], ans: 2 },
                { cat: '?МмХЕ', q: "л∞©нГД?МлЕД??BTS)??л™ЕмЖМл•?м∞ЊмХД?§лЛИ???ђнЦЙ лђЄнЩФл•?лђімЧЗ?ілЭЉ ?ШлВШ??", opts: ["л∞©нГД ?ђмЦі", "K???Ьл?", "?ДмЭі??мЇ†нФД", "лЃ§мІБ л°ЬлУЬ"], ans: 0 },
                { cat: '?ђнЖ†м°?, q: "?Ьл≥µ???ЕмЬЉл©??ЕмЮ•л£Мк? л©ім†Ь?ШлКФ ?ЬмЪЄ???А??кґБкґР?А?", opts: ["к≤љл≥µкґ?, "?®мВ∞?А??, "л°?Н∞?ФлУЬ", "мљФмЧС??], ans: 0 },
                { cat: '?°нЛ∞лєДнЛ∞', q: "?ЬмЪЄ ?Ьк∞Х?РмДЬ ?љк≤М лєМл†§ ?????ИлКФ к≥µк≥µ?Рм†Дк±∞мЭШ ?іл¶Д?А?", opts: ["?љмФљ??, "?∞л¶Й??, "?А??, "?імЪЄлІ?], ans: 1 }
            ]
        };
        let currentQ = 0, score = 0, quizData = baseContent.data;
        function startQuiz() { setTimeout(() => { document.getElementById('q-loading').classList.add('hidden'); document.getElementById('q-container').classList.remove('hidden'); showQuestion(); }, 1500); }
        function showQuestion() {
            const q = quizData[currentQ];
            document.getElementById('q-progress').innerText = (currentQ + 1) + ' / ' + quizData.length;
            document.getElementById('q-category').innerText = q.cat;
            document.getElementById('q-text').innerText = q.q;
            const optsDiv = document.getElementById('q-options');
            optsDiv.innerHTML = '';
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('div'); btn.className = 'quiz-option fade-in'; btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn); optsDiv.appendChild(btn);
            });
        }
        function checkAnswer(idx, btn) {
            if (document.querySelector('.quiz-option.correct')) return;
            const correctIdx = quizData[currentQ].ans, isCorrect = idx === correctIdx;
            if (isCorrect) { score++; btn.classList.add('correct'); showFeedback(true); } 
            else { btn.classList.add('incorrect'); document.querySelectorAll('.quiz-option')[correctIdx].classList.add('correct'); showFeedback(false); }
            setTimeout(() => { currentQ++; if (currentQ < quizData.length) showQuestion(); else showResult(); }, 1500);
        }
        function showFeedback(isCorrect) {
            const feedback = document.getElementById('q-feedback'), icon = document.getElementById('q-feedback-icon');
            icon.innerText = isCorrect ? "в≠? : "??; feedback.classList.replace('opacity-0', 'opacity-100'); feedback.classList.replace('scale-110', 'scale-100');
            setTimeout(() => { feedback.classList.replace('opacity-100', 'opacity-0'); feedback.classList.replace('scale-100', 'scale-110'); }, 800);
        }
        function showResult() {
            document.getElementById('res-score').innerText = score; document.getElementById('res-points').innerText = score * 100;
            document.getElementById('q-result').classList.remove('hidden');
        }
        window.onload = startQuiz;
    </script>
</body>
</html>
