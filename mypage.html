<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | 마이페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        .brand-navy { color: #0A1931; } .brand-green { color: #1E5128; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .pb-safe { padding-bottom: 100px; }
        .info-field { background: white; border: 1px solid #f1f5f9; border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
        .field-label { font-weight: 700; color: #64748b; font-size: 0.9rem; }
        .field-value { font-weight: 800; color: #0A1931; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">
    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">
        <header class="bg-white/95 px-6 py-4 flex justify-between items-center border-b border-slate-100 sticky top-0 z-50 backdrop-blur-md">
            <a href="index.html" class="text-2xl font-900 brand-navy tracking-tighter no-underline">MeoGo</a>
            <button onclick="handleLogout()" class="text-sm font-700 text-slate-400">로그아웃</button>
        </header>

        <main class="flex-grow pb-safe px-6">
            <div class="py-10 flex flex-col items-center">
                <div class="w-24 h-24 rounded-full bg-slate-100 border-4 border-white shadow-lg overflow-hidden mb-4">
                    <img id="p-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=MeoGo" alt="avatar">
                </div>
                <h2 class="text-2xl font-900 brand-navy mb-1" id="display-name">LOADING...</h2>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-900 bg-brand-green text-white px-2 py-0.5 rounded">LEVEL 1</span>
                    <span class="text-sm font-800 text-brand-green" id="p-points">0 P</span>
                </div>
            </div>

            <div class="space-y-3" id="profile-content">
                <div class="info-field"><span class="field-label">닉네임</span><span class="field-value" id="p-nick">-</span></div>
                <div class="info-field"><span class="field-label">성별</span><span class="field-value" id="p-gender">-</span></div>
                <div class="info-field"><span class="field-label">생년월일</span><span class="field-value" id="p-birth">-</span></div>
                <div class="info-field"><span class="field-label">국가</span><span class="field-value" id="p-country">-</span></div>
            </div>

            <div class="mt-8">
                <button onclick="location.href='edit_profile.html'" class="w-full py-4 border-2 border-slate-100 rounded-2xl font-800 text-slate-500 hover:bg-slate-50 transition-all">프로필 수정하기</button>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/98 border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="index.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>미션</span></a>
            <a href="wishlist.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg><span>찜</span></a>
            <a href="history.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span>기록</span></a>
            <a href="mypage.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>마이</span></a>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProfile() {
            // 1. 현재 로그인 세션 확인
            const { data: { session }, error: authError } = await _supabase.auth.getSession();
            
            if (authError || !session) {
                alert("로그인이 필요합니다.");
                location.href = 'login.html'; // 로그인 페이지로 리다이렉트
                return;
            }

            const user = session.user;

            // 2. profiles 테이블에서 정보 조회
            const { data: profile, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (error) {
                console.error("데이터 로드 에러:", error);
                document.getElementById('display-name').innerText = "정보 없음";
                return;
            }

            // 3. 화면 업데이트
            if (profile) {
                document.getElementById('p-nick').innerText = profile.nickname || '미설정';
                document.getElementById('p-gender').innerText = profile.gender || '미설정';
                document.getElementById('p-birth').innerText = profile.birth_date || '미설정';
                document.getElementById('p-country').innerText = profile.country || '미설정';
                document.getElementById('p-points').innerText = `${profile.total_points || 0} P`;
                document.getElementById('display-name').innerText = (profile.nickname || 'GUEST').toUpperCase();
                
                if(profile.avatar_url) {
                    document.getElementById('p-avatar').src = profile.avatar_url;
                }
            }
        }

        async function handleLogout() {
            const { error } = await _supabase.auth.signOut();
            if(!error) location.href = 'index.html';
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
