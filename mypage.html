<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pb-safe { padding-bottom: calc(9rem + env(safe-area-inset-bottom)); }
        .gradient-text { background: linear-gradient(to right, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-card { background: white; border-radius: 1.5rem; padding: 1rem 0.25rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: all 0.2s; border: 1px solid #f1f5f9; min-height: 100px; justify-content: center; }
        .category-card:active { transform: scale(0.95); }
        .icon-wrapper { width: 3rem; height: 3rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 0.5rem; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; transition: color 0.2s; flex: 1; }
        .nav-item.active { color: #4f46e5; }
        .mission-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 1rem; animation: fadeIn 0.4s ease-out; }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 6px; margin-right: 4px; }
        .translating { opacity: 0.5; filter: blur(1px); pointer-events: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 overflow-x-hidden">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-xl">
        
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <button id="back-btn" onclick="goHome()" class="p-1.5 -ml-1 rounded-full hover:bg-slate-100 transition-colors invisible">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <div class="flex flex-col">
                    <h1 class="text-xl font-black gradient-text tracking-tighter cursor-pointer" onclick="goHome()">Quest-K</h1>
                    <div id="user-mini-profile" class="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                        <span id="mini-nickname">Guest</span> • <span id="mini-points" class="text-indigo-500">0P</span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="lang-btn" onclick="toggleLangDropdown(event)" class="bg-[#f1f5f9] px-3 py-1.5 rounded-full text-[0.75rem] font-bold text-slate-600 border border-slate-200 hover:bg-slate-200 transition-all flex items-center gap-1.5">
                    <span id="current-lang-label">KO</span>
                </button>
                <button onclick="goProfile()" class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden border border-slate-100">
                    <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" alt="avatar">
                </button>
            </div>

            <div id="lang-dropdown" class="absolute right-14 top-full mt-2 w-40 bg-white border border-slate-100 rounded-2xl shadow-xl hidden z-[110]">
                <div class="flex flex-col p-1">
                    <button onclick="selectLanguage('KO')" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-indigo-50 rounded-xl">🇰🇷 한국어</button>
                    <button onclick="selectLanguage('EN')" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-indigo-50 rounded-xl">🇺🇸 English</button>
                    <button onclick="selectLanguage('JP')" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-indigo-50 rounded-xl">🇯🇵 日本語</button>
                </div>
            </div>
        </header>

        <main id="main-content" class="flex-grow pb-safe overflow-y-auto"></main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/95 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.06)]">
            <button id="nav-home" class="nav-item active" onclick="goHome()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span data-lang="nav-mission">미션</span>
            </button>
            <button id="nav-wish" class="nav-item" onclick="alert('찜 목록 기능 준비 중!')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                <span data-lang="nav-wish">찜</span>
            </button>
            <button id="nav-profile" class="nav-item" onclick="goProfile()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                <span data-lang="nav-history">프로필</span>
            </button>
        </nav>
    </div>

    <script type="text/template" id="tpl-profile">
        <div class="p-8 flex flex-col items-center animate-[fadeIn_0.3s_ease-out]">
            <div class="w-24 h-24 rounded-3xl bg-indigo-50 border-4 border-white shadow-lg overflow-hidden mb-4">
                <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" class="w-full h-full object-cover">
            </div>
            <h2 id="profile-nickname" class="text-2xl font-black text-slate-900 mb-1">Guest User</h2>
            <p class="text-indigo-600 font-bold mb-8" id="profile-points">0 Points Earned</p>
            
            <div class="w-full grid grid-cols-2 gap-4 mb-10">
                <div class="bg-slate-50 p-5 rounded-3xl text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Rank</p>
                    <p class="text-lg font-black text-slate-700">Beginner</p>
                </div>
                <div class="bg-slate-50 p-5 rounded-3xl text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Quests</p>
                    <p class="text-lg font-black text-slate-700">0</p>
                </div>
            </div>

            <button onclick="alert('준비 중!')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mb-3">Edit Profile</button>
            <button onclick="location.reload()" class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black">Logout</button>
        </div>
    </script>

    <script type="text/template" id="tpl-home">
        <section class="px-5 mt-6">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2.5rem] p-7 text-white shadow-xl h-44 flex flex-col justify-center relative overflow-hidden">
                <h2 class="text-2xl font-black leading-tight z-10" data-lang="banner-title">광고 시청 시<br>포인트 2배 보상!</h2>
                <p class="text-sm text-indigo-100 mt-2 z-10" data-lang="banner-sub">상위 랭킹 도전의 지름길</p>
            </div>
        </section>
        <section class="px-5 mt-10 mb-20">
            <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-2"><span class="w-1.5 h-6 bg-indigo-600 rounded-full"></span><span data-lang="home-title">어디로 가시나요?</span></h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="category-card" onclick="fetchMissionsByFilter('region', '서울')"><div class="icon-wrapper bg-orange-50 text-orange-500">🏙️</div><span class="text-[0.7rem] font-black" data-lang="reg-seoul">서울</span></div>
                <div class="category-card" onclick="fetchMissionsByFilter('region', '경기')"><div class="icon-wrapper bg-blue-50 text-blue-500">🏰</div><span class="text-[0.7rem] font-black" data-lang="reg-gyeonggi">경기</span></div>
                <div class="category-card" onclick="fetchMissionsByFilter('region', '제주')"><div class="icon-wrapper bg-pink-50 text-pink-500">🗿</div><span class="text-[0.7rem] font-black" data-lang="reg-jeju">제주</span></div>
                <div class="category-card" onclick="fetchMissionsByFilter('region', '전국공통')"><div class="icon-wrapper bg-gray-100 text-gray-500">🌍</div><span class="text-[0.7rem] font-black" data-lang="reg-anywhere">전국</span></div>
            </div>
        </section>
    </script>

    <script type="text/template" id="tpl-mission-list">
        <div class="p-5 animate-[fadeIn_0.3s_ease-out]">
            <h3 id="list-title" class="text-xl font-black mb-6 text-slate-900 flex items-center gap-2"></h3>
            <div id="mission-items"></div>
        </div>
    </script>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userProfile = { nickname: 'Guest', points: 0, avatar_url: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky' };

        // 1. 프로필 정보 로드 로직
        async function loadProfile() {
            let stored = localStorage.getItem('user_profile');
            if(stored) {
                userProfile = JSON.parse(stored);
                updateUIProfile();
            }
        }

        function updateUIProfile() {
            const nickEl = document.getElementById('mini-nickname');
            const ptEl = document.getElementById('mini-points');
            const avEl = document.getElementById('header-avatar');
            if(nickEl) nickEl.innerText = userProfile.nickname;
            if(ptEl) ptEl.innerText = userProfile.points + 'P';
            if(avEl) avEl.src = userProfile.avatar_url;
        }

        async function acceptMission(missionId, points) {
            userProfile.points += parseInt(points);
            localStorage.setItem('user_profile', JSON.stringify(userProfile));
            updateUIProfile();
            alert('Mission Accepted! Points earned: ' + points);
        }

        function goProfile() {
            const contentArea = document.getElementById('main-content');
            contentArea.innerHTML = document.getElementById('tpl-profile').innerHTML;
            document.getElementById('profile-nickname').innerText = userProfile.nickname;
            document.getElementById('profile-points').innerText = userProfile.points + ' Points Earned';
            document.getElementById('profile-avatar').src = userProfile.avatar_url;
            document.getElementById('back-btn').classList.remove('invisible');
            updateNav('profile');
        }

        async function fetchMissionsByFilter(type, value) {
            const contentArea = document.getElementById('main-content');
            contentArea.innerHTML = '<div class="p-10 text-center">Loading...</div>';
            document.getElementById('back-btn').classList.remove('invisible');
            
            const { data } = await _supabase.from('missions').select('*').eq(type, value);
            renderMissionList(value, data);
        }

        function renderMissionList(title, items) {
            const container = document.getElementById('main-content');
            container.innerHTML = document.getElementById('tpl-mission-list').innerHTML;
            document.getElementById('list-title').innerText = title;
            const itemsDiv = document.getElementById('mission-items');

            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'mission-card';
                el.innerHTML = `
                    <h4 class="font-black text-lg mb-1">${item.mission_name}</h4>
                    <p class="text-xs text-slate-500 mb-4">${item.guide}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-indigo-600 font-black">100P</span>
                        <button onclick="acceptMission('${item.id}', 100)" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-xs font-black">Accept</button>
                    </div>
                `;
                itemsDiv.appendChild(el);
            });
        }

        function goHome() {
            document.getElementById('main-content').innerHTML = document.getElementById('tpl-home').innerHTML;
            document.getElementById('back-btn').classList.add('invisible');
            updateNav('home');
        }

        function updateNav(navId) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navEl = document.getElementById('nav-' + navId);
            if(navEl) navEl.classList.add('active');
        }

        window.onload = () => {
            loadProfile();
            goHome();
        };

        function toggleLangDropdown(e) {
            e.stopPropagation();
            document.getElementById('lang-dropdown').classList.toggle('hidden');
        }
    </script>
</body>
</html>
