    <script>
        function loadData() {
            try {
                const user = JSON.parse(localStorage.getItem('meogo_user') || '{}');
                const history = JSON.parse(localStorage.getItem('meogo_history') || '[]');
                
                document.getElementById('nick-display').textContent = user.nickname || 'GUEST';
                document.getElementById('info-nick').textContent = user.nickname || '-';
                document.getElementById('info-gender').textContent = user.gender || '-';
                document.getElementById('info-birth').textContent = user.birth_date || '-';
                document.getElementById('info-country').textContent = user.country || '-';
                document.getElementById('completed-count').textContent = history.length;
            } catch (e) { console.error(e); }
        }
        window.onload = loadData;
    </script>
