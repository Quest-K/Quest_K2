<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Explore Korea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .hero-gradient { background: linear-gradient(135deg, #0A1931 0%, #1E5128 100%); }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
        <!-- 상단 헤더 -->
        <header class="px-6 py-5 flex justify-between items-center sticky top-0 bg-white/95 z-50 backdrop-blur-md">
            <h1 class="text-2xl font-900 brand-navy tracking-tighter italic">MeoGo</h1>
            <div id="user-status" class="text-xs font-800 text-slate-400">Loading...</div>
        </header>

        <main class="flex-grow pb-24">
            <!-- 히어로 섹션: 서비스 가치 제안 -->
            <section class="px-6 py-8">
                <div class="hero-gradient rounded-[2.5rem] p-8 text-white shadow-xl shadow-navy/20 relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-3xl font-900 leading-tight mb-3">Experience<br>Real Korea 🇰🇷</h2>
                        <p class="text-white/80 font-600 text-sm mb-6">Complete missions and collect points while traveling.</p>
                        <a href="mission.html" class="inline-block bg-white text-brand-navy px-6 py-3 rounded-full font-900 text-sm shadow-lg active:scale-95 transition-transform">Start Mission</a>
                    </div>
                    <div class="absolute -right-4 -bottom-4 opacity-20 transform rotate-12">
                        <svg width="150" height="150" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                    </div>
                </div>
            </section>

            <!-- 퀵 통계 / 상태 -->
            <section class="px-6 grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                    <p class="text-slate-400 text-xs font-800 uppercase mb-1">Active Missions</p>
                    <p class="text-2xl font-900 brand-navy">240+</p>
                </div>
                <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                    <p class="text-slate-400 text-xs font-800 uppercase mb-1">My Rank</p>
                    <p class="text-2xl font-900 brand-green" id="my-rank">-</p>
                </div>
            </section>

            <!-- 추천/인기 미션 미리보기 -->
            <section class="px-6 mb-8">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-xl font-900 brand-navy tracking-tight">Today's Hot Missions</h3>
                    <a href="mission.html" class="text-sm font-800 text-slate-400">View All</a>
                </div>
                <div id="featured-list" class="space-y-4">
                    <!-- JS에서 동적 로드 -->
                    <div class="animate-pulse flex space-x-4 bg-slate-50 p-5 rounded-2xl">
                        <div class="flex-1 space-y-4 py-1">
                            <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                            <div class="h-4 bg-slate-200 rounded"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 네비게이션 -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="index.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>홈</span></a>
            <a href="mission.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><span>탐색</span></a>
            <a href="wishlist.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg><span>찜</span></a>
            <a href="mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>마이</span></a>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function initHome() {
            // 세션 체크
            const { data: { session } } = await _supabase.auth.getSession();
            const statusEl = document.getElementById('user-status');
            if (session) {
                statusEl.innerText = session.user.email.split('@')[0];
                loadUserStats(session.user.id);
            } else {
                statusEl.innerHTML = '<a href="mypage.html" class="text-brand-green underline">Sign In</a>';
            }
            loadFeaturedMissions();
        }

        async function loadUserStats(userId) {
            const { data } = await _supabase.from('profiles').select('total_points').eq('id', userId).single();
            if (data) document.getElementById('my-rank').innerText = `${data.total_points}P`;
        }

        async function loadFeaturedMissions() {
            const { data } = await _supabase.from('missions').select('*').limit(3);
            const listDiv = document.getElementById('featured-list');
            if (data) {
                listDiv.innerHTML = data.map(m => `
                    <div class="bg-white border border-slate-100 p-4 rounded-3xl flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center font-900 brand-green text-xs uppercase">${m.category[0]}</div>
                        <div class="flex-grow">
                            <h4 class="font-900 brand-navy text-sm mb-1">${m.mission_name}</h4>
                            <p class="text-[10px] font-700 text-slate-400 uppercase tracking-widest">${m.region}</p>
                        </div>
                        <div class="text-brand-green font-900 text-xs">${m.base_points}P</div>
                    </div>
                `).join('');
            }
        }

        window.onload = initHome;
    </script>
</body>
</html>
