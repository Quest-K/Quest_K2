<!-- 전라도 페이지 전용 스타일 -->
<style>
    .region-card {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #f1f5f9;
        background: white;
    }
    .region-card:active {
        transform: scale(0.96);
        background-color: #f0fdf4; /* 전라도의 에메랄드 그린 포인트 컬러 */
    }
    
    /* index.html에 정의되지 않았을 경우를 대비한 로컬 애니메이션 */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
    }
</style>

<!-- 본문 컨텐츠 영역 -->
<div class="opacity-0 animate-fadeIn">
    <!-- Guide Section -->
    <section class="px-6 py-8">
        <h2 id="jeonla-guide-main" class="text-2xl font-black text-slate-900 leading-tight tracking-tight">
            맛과 전통의 고장,<br>전라도를 경험하세요!
        </h2>
        <p id="jeonla-guide-sub" class="text-slate-500 mt-2 text-sm font-bold">전라도의 매력을 느낄 지역을 선택하세요.</p>
    </section>

    <!-- Region Cards Grid -->
    <section class="px-4 grid grid-cols-2 gap-4">
        <!-- 전북권 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('전북권 미션 준비 중!')">
            <div class="text-3xl mb-2">🥘</div>
            <span id="label-jb" class="text-sm font-black text-slate-900">전북권</span>
            <p id="desc-jb" class="text-[10px] text-slate-400 font-bold mt-1">전주 한옥마을 · 군산 시간여행</p>
        </div>

        <!-- 전남 동부권 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('전남 동부권 미션 준비 중!')">
            <div class="text-3xl mb-2">⚓</div>
            <span id="label-jn-east" class="text-sm font-black text-slate-900">전남 동부권</span>
            <p id="desc-jn-east" class="text-[10px] text-slate-400 font-bold mt-1">여수 밤바다 · 순천만 정원</p>
        </div>

        <!-- 전남 서부권 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('전남 서부권 미션 준비 중!')">
            <div class="text-3xl mb-2">🎋</div>
            <span id="label-jn-west" class="text-sm font-black text-slate-900">전남 서부권</span>
            <p id="desc-jn-west" class="text-[10px] text-slate-400 font-bold mt-1">목포 근대화거리 · 담양 죽녹원</p>
        </div>

        <!-- 광주광역시 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('광주광역시 미션 준비 중!')">
            <div class="text-3xl mb-2">🌆</div>
            <span id="label-gj" class="text-sm font-black text-slate-900">광주광역시</span>
            <p id="desc-gj" class="text-[10px] text-slate-400 font-bold mt-1">예술의 거리 · 양림동 펭귄마을</p>
        </div>
    </section>

    <!-- Info Card -->
    <section class="px-5 my-10">
        <div class="bg-emerald-600 rounded-3xl p-6 flex items-start gap-4 shadow-xl shadow-emerald-100">
            <div class="text-xl bg-white/20 p-2 rounded-xl">🍵</div>
            <div>
                <h4 id="info-title" class="text-sm font-black text-white">전라도 미식 여행 팁</h4>
                <p id="info-desc" class="text-xs text-emerald-50 mt-2 leading-relaxed font-medium">
                    진정한 한국의 맛을 느끼고 싶다면 <span class='font-black underline'>전주 비빔밥</span>과 <span class='font-black underline'>남해안 해산물</span>을 놓치지 마세요! 여수와 목포의 야경은 덤입니다.
                </p>
            </div>
        </div>
    </section>
</div>

<script>
    /**
     * 전라도 페이지 전용 다국어 텍스트 업데이트
     * index.html에서 설정된 localStorage 값을 읽어와 실행됩니다.
     */
    (function() {
        const langData = {
            KO: {
                guideMain: "맛과 전통의 고장,<br>전라도를 경험하세요!",
                guideSub: "전라도의 매력을 느낄 지역을 선택하세요.",
                jb: "전북권", jbDesc: "전주 한옥마을 · 군산 시간여행",
                jnEast: "전남 동부권", jnEastDesc: "여수 밤바다 · 순천만 정원",
                jnWest: "전남 서부권", jnWestDesc: "목포 근대화거리 · 담양 죽녹원",
                gj: "광주광역시", gjDesc: "예술의 거리 · 양림동 펭귄마을",
                infoTitle: "전라도 미식 여행 팁",
                infoDesc: "진정한 한국의 맛을 느끼고 싶다면 <span class='font-black underline'>전주 비빔밥</span>과 <span class='font-black underline'>남해안 해산물</span>을 놓치지 마세요!"
            },
            EN: {
                guideMain: "Experience food and<br>tradition in Jeonla!",
                guideSub: "Choose a region to feel the charm of Jeonla.",
                jb: "Jeonbuk Area", jbDesc: "Jeonju Hanok Village, Gunsan",
                jnEast: "East Jeonnam", jnEastDesc: "Yeosu Sea, Suncheon Bay",
                jnWest: "West Jeonnam", jnWestDesc: "Mokpo, Damyang Bamboo Forest",
                gj: "Gwangju City", gjDesc: "Art Street, Yangnim-dong Village",
                infoTitle: "Jeonla Gourmet Tips",
                infoDesc: "Don't miss <span class='font-black underline'>Jeonju Bibimbap</span> and <span class='font-black underline'>Seafood</span>!"
            },
            JP: {
                guideMain: "味と伝統의故郷、<br>全羅道を体験してください！",
                guideSub: "全羅道の魅력을感じる地域を選択してください。",
                jb: "全北エリア", jbDesc: "全州韓屋村 · 群山時間旅行",
                jnEast: "全南東部", jnEastDesc: "麗水の海 · 順天湾国家庭園",
                jnWest: "全南西部", jnWestDesc: "木浦近代化通り · 潭陽竹緑苑",
                gj: "光州広域市", gjDesc: "芸術の通り · 楊林洞ペンギン村",
                infoTitle: "全羅道美食のコツ",
                infoDesc: "<span class='font-black underline'>全州ビビンバ</span>と <span class='font-black underline'>南海岸の海鮮</span>をお見逃しなく！"
            }
        };

        const currentLang = localStorage.getItem('selectedLang') || 'KO';
        const data = langData[currentLang] || langData.KO;

        // 텍스트 업데이트
        document.getElementById('jeonla-guide-main').innerHTML = data.guideMain;
        document.getElementById('jeonla-guide-sub').innerText = data.guideSub;
        document.getElementById('label-jb').innerText = data.jb;
        document.getElementById('desc-jb').innerText = data.jbDesc;
        document.getElementById('label-jn-east').innerText = data.jnEast;
        document.getElementById('desc-jn-east').innerText = data.jnEastDesc;
        document.getElementById('label-jn-west').innerText = data.jnWest;
        document.getElementById('desc-jn-west').innerText = data.jnWestDesc;
        document.getElementById('label-gj').innerText = data.gj;
        document.getElementById('desc-gj').innerText = data.gjDesc;
        document.getElementById('info-title').innerText = data.infoTitle;
        document.getElementById('info-desc').innerHTML = data.infoDesc;
    })();
</script>
