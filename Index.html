<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K Single Page Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pb-safe { padding-bottom: calc(5.5rem + env(safe-area-inset-bottom)); }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .category-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #f1f5f9;
        }
        .category-card:active { transform: scale(0.95); }
        .icon-wrapper {
            width: 3.25rem;
            height: 3.25rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: white;
            min-width: 140px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid #f1f5f9;
        }
        .lang-dropdown.show { display: block; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94a3b8; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: #4f46e5; }
        
        /* Smooth transitions */
        #main-content { transition: opacity 0.2s ease-in-out; }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative">
        
        <!-- [FIXED HEADER] -->
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <button id="back-btn" onclick="goHome()" class="p-1.5 -ml-1 rounded-full hover:bg-slate-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h1 class="text-2xl font-black gradient-text tracking-tighter cursor-pointer" onclick="goHome()">Quest-K</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="lang-container relative">
                    <button class="bg-[#f1f5f9] px-3 py-1.5 rounded-full text-[0.75rem] font-bold text-slate-600 flex items-center gap-1 border border-slate-200" onclick="toggleLangDropdown(event)">
                        <span class="text-blue-500">🌐</span> <span id="currentLangDisplay">KO</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 9l-7 7-7-7" stroke-width="3" /></svg>
                    </button>
                    <div id="langDropdown" class="lang-dropdown">
                        <div class="p-3 hover:bg-slate-50 cursor-pointer text-sm font-medium" onclick="changeLanguage('KO')">🇰🇷 한국어</div>
                        <div class="p-3 hover:bg-slate-50 cursor-pointer text-sm font-medium" onclick="changeLanguage('EN')">🇺🇸 English</div>
                        <div class="p-3 hover:bg-slate-50 cursor-pointer text-sm font-medium" onclick="changeLanguage('JP')">🇯🇵 日本語</div>
                    </div>
                </div>
                <button class="p-2 text-slate-400 hover:text-slate-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg></button>
            </div>
        </header>

        <!-- [DYNAMIC CONTENT AREA] -->
        <main id="main-content" class="flex-grow pb-safe overflow-y-auto">
            <!-- Content will be injected here -->
        </main>

        <!-- [FIXED NAVIGATION] -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <button id="nav-home" class="nav-item active" onclick="navigate('home')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span id="txt-nav-home">홈</span>
            </button>
            <button id="nav-mission" class="nav-item" onclick="navigate('mission')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                <span id="txt-nav-mission">미션</span>
            </button>
            <button id="nav-rank" class="nav-item" onclick="navigate('rank')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                <span id="txt-nav-rank">랭킹</span>
            </button>
            <button id="nav-history" class="nav-item" onclick="navigate('history')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                <span id="txt-nav-record">기록</span>
            </button>
        </nav>
    </div>

    <!-- [CONTENT TEMPLATES - Hidden from UI, Used by JS] -->
    <script type="text/template" id="tpl-home">
        <section class="px-5 mt-6">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2rem] p-7 text-white relative overflow-hidden shadow-xl h-48 flex flex-col justify-center">
                <div class="z-10">
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Point Boost</span>
                    <h2 class="text-2xl font-black mt-3 leading-tight">광고 시청 시<br>포인트 2배 보상!</h2>
                    <p class="text-sm text-indigo-100 mt-2 font-medium opacity-80">상위 랭킹 도전의 지름길</p>
                </div>
                <div class="absolute right-[-20px] bottom-[-20px] opacity-10">
                    <svg width="200" height="200" viewBox="0 0 24 24" fill="white"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" /></svg>
                </div>
            </div>
        </section>

        <section class="px-5 mt-12 mb-10">
            <div class="flex justify-between items-end mb-6">
                <h3 class="text-2xl font-black text-slate-900 leading-none">어디로 가시나요?</h3>
                <button class="text-sm font-bold text-indigo-600">전체 지역</button>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <div class="category-card" onclick="navigate('seoul')">
                    <div class="icon-wrapper bg-orange-50 text-orange-500">🏙️</div>
                    <span class="text-xs font-black">서울</span>
                </div>
                <div class="category-card" onclick="navigate('gyeonggi')">
                    <div class="icon-wrapper bg-blue-50 text-blue-500">🏰</div>
                    <span class="text-xs font-black">경기</span>
                </div>
                <div class="category-card" onclick="alertReady('강원')">
                    <div class="icon-wrapper bg-green-50 text-green-500">🌲</div>
                    <span class="text-xs font-black text-slate-400">강원</span>
                </div>
                <div class="category-card" onclick="alertReady('충청')">
                    <div class="icon-wrapper bg-yellow-50 text-yellow-600">🌳</div>
                    <span class="text-xs font-black text-slate-400">충청</span>
                </div>
                <div class="category-card" onclick="alertReady('전라')">
                    <div class="icon-wrapper bg-purple-50 text-purple-500">🥘</div>
                    <span class="text-xs font-black text-slate-400">전라</span>
                </div>
                <div class="category-card" onclick="alertReady('경상')">
                    <div class="icon-wrapper bg-indigo-50 text-indigo-500">🌉</div>
                    <span class="text-xs font-black text-slate-400">경상</span>
                </div>
                <div class="category-card" onclick="alertReady('제주')">
                    <div class="icon-wrapper bg-red-50 text-red-500">🗿</div>
                    <span class="text-xs font-black text-slate-400">제주</span>
                </div>
                <div class="category-card" onclick="navigate('anywhere')">
                    <div class="icon-wrapper bg-gray-100 text-gray-500">🌍</div>
                    <span class="text-xs font-black">전국</span>
                </div>
            </div>
        </section>
    </script>

    <script type="text/template" id="tpl-seoul">
        <div class="px-5 pt-6 animate-in slide-in-from-bottom-4 duration-500">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-2xl">🏙️</div>
                <div>
                    <h2 class="text-2xl font-black text-slate-900">서울 퀘스트</h2>
                    <p class="text-sm text-slate-500 font-medium">대한민국의 심장, 서울을 정복하세요!</p>
                </div>
            </div>
            
            <div class="space-y-4">
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group active:scale-95 transition-transform">
                    <div>
                        <span class="text-[10px] font-bold text-orange-500 bg-orange-50 px-2 py-0.5 rounded-full uppercase">K-Tradition</span>
                        <h4 class="font-bold text-slate-800 mt-1">경복궁에서 수문장과 사진 찍기</h4>
                        <p class="text-xs text-slate-400 mt-1">보상: 500 P</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7" stroke-width="3" /></svg>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center opacity-60">
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full uppercase">K-Life</span>
                        <h4 class="font-bold text-slate-800 mt-1">한강공원에서 라면 끓여먹기</h4>
                        <p class="text-xs text-slate-400 mt-1">보상: 300 P</p>
                    </div>
                    <div class="text-xs font-bold text-slate-400 italic underline">Locked</div>
                </div>
            </div>
        </div>
    </script>

    <script type="text/template" id="tpl-mission">
        <div class="p-8 text-center pt-20">
            <div class="text-6xl mb-6">📝</div>
            <h2 class="text-2xl font-black text-slate-800">나의 미션</h2>
            <p class="text-slate-500 mt-2">현재 진행 중인 미션이 없습니다.<br>지역을 선택해 미션을 시작하세요!</p>
            <button onclick="goHome()" class="mt-8 bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200">지역 보러가기</button>
        </div>
    </script>

    <script type="text/template" id="tpl-rank">
        <div class="px-5 pt-6">
            <h2 class="text-2xl font-black text-slate-900 mb-6">글로벌 랭킹</h2>
            <div class="bg-indigo-600 rounded-[2.5rem] p-6 text-white mb-8 shadow-xl relative overflow-hidden">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest">My Rank</p>
                        <h3 class="text-4xl font-black mt-1">1,248<span class="text-lg font-medium ml-1">th</span></h3>
                    </div>
                    <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl text-sm font-bold">
                        Top 12%
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-20 rotate-12">
                    <svg width="180" height="180" viewBox="0 0 24 24" fill="white"><path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27Z"/></svg>
                </div>
            </div>
            <div class="space-y-4">
                <div class="flex items-center gap-4 p-4 bg-white rounded-3xl border border-slate-50 shadow-sm">
                    <span class="w-8 text-xl font-black text-yellow-500">1</span>
                    <div class="w-10 h-10 rounded-full bg-slate-200"></div>
                    <div class="flex-grow">
                        <p class="font-bold text-slate-800">QuestMaster_KR</p>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">98,200 Points</p>
                    </div>
                    <div class="text-sm">🥇</div>
                </div>
            </div>
        </div>
    </script>

    <script>
        // --- ROUTING LOGIC ---
        function navigate(pageId) {
            const contentArea = document.getElementById('main-content');
            const template = document.getElementById('tpl-' + pageId);
            
            if (!template) {
                console.error('Template not found:', pageId);
                return;
            }

            // Fade effect
            contentArea.classList.add('fade-out');
            
            setTimeout(() => {
                // Update Content
                contentArea.innerHTML = template.innerHTML;
                contentArea.classList.remove('fade-out');
                contentArea.classList.add('fade-in');
                
                // Update Nav States
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                const targetNav = document.getElementById('nav-' + (pageId === 'home' || pageId === 'seoul' || pageId === 'gyeonggi' || pageId === 'anywhere' ? 'home' : pageId));
                if (targetNav) targetNav.classList.add('active');
                
                // Show/Hide Back Button
                const backBtn = document.getElementById('back-btn');
                if (pageId === 'home') {
                    backBtn.classList.add('invisible');
                } else {
                    backBtn.classList.remove('invisible');
                }

                window.scrollTo(0, 0);
            }, 150);
        }

        function goHome() {
            navigate('home');
        }

        // --- UI LOGIC ---
        function toggleLangDropdown(e) {
            e.stopPropagation();
            document.getElementById('langDropdown').classList.toggle('show');
        }

        function changeLanguage(lang) {
            document.getElementById('currentLangDisplay').innerText = lang;
            document.getElementById('langDropdown').classList.remove('show');
            // In real app, apply translations here
        }

        function alertReady(name) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center animate-in zoom-in-95 duration-300">
                    <div class="text-5xl mb-4">🚧</div>
                    <h3 class="text-xl font-black text-slate-900">${name} 지역 준비 중</h3>
                    <p class="text-slate-500 mt-2 font-medium">조금만 기다려주세요!<br>더 재미있는 퀘스트가 준비 중입니다.</p>
                    <button onclick="this.parentElement.parentElement.remove()" class="mt-6 w-full bg-slate-100 py-4 rounded-2xl font-black text-slate-800 active:scale-95 transition-transform">확인</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // --- INITIALIZATION ---
        window.onclick = () => document.getElementById('langDropdown').classList.remove('show');
        
        window.onload = () => {
            navigate('home');
        };
    </script>
</body>
</html>
