<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Quest Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pb-safe { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .category-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #f1f5f9;
        }
        .category-card:active { transform: scale(0.95); }
        .icon-wrapper {
            width: 3.25rem;
            height: 3.25rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        /* 공통 상단바 스타일 */
        .lang-container { position: relative; display: inline-block; }
        .lang-btn {
            background: #f1f5f9;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #e2e8f0;
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: white;
            min-width: 140px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid #f1f5f9;
        }
        .lang-dropdown.show { display: block; }
        .lang-option {
            padding: 0.8rem 1rem;
            font-size: 0.875rem;
            color: #475569;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lang-option:hover { background: #f8fafc; }
        .lang-option.active {
            color: #4f46e5;
            font-weight: bold;
            background: #eef2ff;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94a3b8; font-weight: 600; }
        .nav-item.active { color: #4f46e5; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="max-w-2xl mx-auto min-h-screen pb-safe">
        
        <!-- [고정 상단바] -->
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <button id="back-btn" onclick="history.back()" class="hidden p-1.5 -ml-1 rounded-full hover:bg-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h1 class="text-2xl font-black gradient-text tracking-tighter cursor-pointer" onclick="location.href='index.html'">K-Quest</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="lang-container">
                    <button class="lang-btn shadow-sm" onclick="toggleLangDropdown(event)">
                        <span class="text-blue-500">🌐</span>
                        <span id="currentLangDisplay">KO</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    <div id="langDropdown" class="lang-dropdown">
                        <div class="lang-option" data-lang="KO" onclick="changeLanguage('KO')"><span>🇰🇷</span> 한국어</div>
                        <div class="lang-option" data-lang="EN" onclick="changeLanguage('EN')"><span>🇺🇸</span> English</div>
                        <div class="lang-option" data-lang="JP" onclick="changeLanguage('JP')"><span>🇯🇵</span> 日本語</div>
                    </div>
                </div>
                <button class="p-2 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg></button>
                <button class="p-2 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></button>
            </div>
        </header>

        <!-- Ad Banner -->
        <section class="px-5 mt-6">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2rem] p-7 text-white relative overflow-hidden shadow-xl h-48 flex flex-col justify-center">
                <div class="z-10">
                    <span id="txt-banner-tag" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Point Boost</span>
                    <h2 id="txt-banner-title" class="text-2xl font-black mt-3 leading-tight">광고 시청 시<br>포인트 2배 보상!</h2>
                    <p id="txt-banner-desc" class="text-sm text-indigo-100 mt-2 font-medium opacity-80">상위 랭킹 도전의 지름길</p>
                </div>
                <div class="absolute right-[-20px] bottom-[-20px] opacity-10">
                    <svg width="200" height="200" viewBox="0 0 24 24" fill="white"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" /></svg>
                </div>
            </div>
        </section>

        <!-- Region Selection (총 8개 지역) -->
        <section class="px-5 mt-12">
            <div class="flex justify-between items-end mb-6">
                <h3 id="txt-region-title" class="text-2xl font-black text-slate-900 leading-none">어디로 가시나요?</h3>
                <button id="txt-region-all" class="text-sm font-bold text-indigo-600">전체 지역</button>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <!-- 1. 서울 -->
                <div class="category-card" onclick="location.href='./Seoul.html'">
                    <div class="icon-wrapper bg-orange-50 text-orange-500">🏙️</div>
                    <span id="txt-reg-seoul" class="text-xs font-black">서울</span>
                </div>
                <!-- 2. 경기 -->
                <div class="category-card" onclick="location.href='./Gyeonggi.html'">
                    <div class="icon-wrapper bg-blue-50 text-blue-500">🏰</div>
                    <span id="txt-reg-gyeonggi" class="text-xs font-black">경기</span>
                </div>
                <!-- 3. 강원 -->
                <div class="category-card" onclick="location.href='./Gangwon.html'">
                    <div class="icon-wrapper bg-green-50 text-green-500">🌲</div>
                    <span id="txt-reg-gangwon" class="text-xs font-black">강원</span>
                </div>
                <!-- 4. 충청 -->
                <div class="category-card" onclick="location.href='./Chungcheong.html'">
                    <div class="icon-wrapper bg-yellow-50 text-yellow-600">🌳</div>
                    <span id="txt-reg-chungcheong" class="text-xs font-black">충청</span>
                </div>
                <!-- 5. 전라 -->
                <div class="category-card" onclick="location.href='./Jeonla.html'">
                    <div class="icon-wrapper bg-purple-50 text-purple-500">🥘</div>
                    <span id="txt-reg-jeonla" class="text-xs font-black">전라</span>
                </div>
                <!-- 6. 경상 -->
                <div class="category-card" onclick="location.href='./Gyeongsang.html'">
                    <div class="icon-wrapper bg-indigo-50 text-indigo-500">🌉</div>
                    <span id="txt-reg-gyeongsang" class="text-xs font-black">경상</span>
                </div>
                <!-- 7. 제주 -->
                <div class="category-card" onclick="location.href='./Jeju.html'">
                    <div class="icon-wrapper bg-red-50 text-red-500">🗿</div>
                    <span id="txt-reg-jeju" class="text-xs font-black">제주</span>
                </div>
                <!-- 8. 전국(지역무관) -->
                <div class="category-card" onclick="location.href='./Anywhere.html'">
                    <div class="icon-wrapper bg-gray-50 text-gray-500">🌍</div>
                    <span id="txt-reg-any" class="text-xs font-black">전국</span>
                </div>
            </div>
        </section>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <button class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span id="nav-home">홈</span></button>
            <button class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg><span id="nav-mission">미션</span></button>
            <button class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg><span id="nav-rank">랭킹</span></button>
            <button class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg><span id="nav-record">기록</span></button>
        </nav>
    </div>

    <script>
        const translations = {
            'KO': { 
                'banner-tag': '포인트 부스트', 'banner-title': '광고 시청 시<br>포인트 2배 보상!', 'banner-desc': '상위 랭킹 도전의 지름길', 
                'region-title': '어디로 가시나요?', 'region-all': '전체 지역', 
                'reg-seoul': '서울', 'reg-gyeonggi': '경기', 'reg-gangwon': '강원', 'reg-chungcheong': '충청', 'reg-jeonla': '전라', 'reg-gyeongsang': '경상', 'reg-jeju': '제주', 'reg-any': '전국', 
                'nav-home': '홈', 'nav-mission': '미션', 'nav-rank': '랭킹', 'nav-record': '기록', 
                'alert-ready': ' 지역은 준비 중입니다.' 
            },
            'EN': { 
                'banner-tag': 'Point Boost', 'banner-title': 'Watch Ad for<br>Double Points!', 'banner-desc': 'Fastest way to climb the ranks', 
                'region-title': 'Where are you going?', 'region-all': 'All Regions', 
                'reg-seoul': 'Seoul', 'reg-gyeonggi': 'Gyeonggi', 'reg-gangwon': 'Gangwon', 'reg-chungcheong': 'Chungcheong', 'reg-jeonla': 'Jeonla', 'reg-gyeongsang': 'Gyeongsang', 'reg-jeju': 'Jeju', 'reg-any': 'Nationwide', 
                'nav-home': 'Home', 'nav-mission': 'Mission', 'nav-rank': 'Ranking', 'nav-record': 'Record', 
                'alert-ready': ' area is coming soon.' 
            },
            'JP': { 
                'banner-tag': 'ポイントブースト', 'banner-title': '広告視聴で<br>ポイント2倍！', 'banner-desc': '上位ランクへの近道', 
                'region-title': 'どこへ行きますか？', 'region-all': '全地域', 
                'reg-seoul': 'ソウル', 'reg-gyeonggi': '京畿', 'reg-gangwon': '江原', 'reg-chungcheong': '忠清', 'reg-jeonla': '全羅', 'reg-gyeongsang': '慶尚', 'reg-jeju': '済州', 'reg-any': '全国', 
                'nav-home': 'ホーム', 'nav-mission': 'ミッション', 'nav-rank': 'ランキング', 'nav-record': '記録', 
                'alert-ready': ' 地域は準備中です。' 
            }
        };

        function toggleLangDropdown(e) { e.stopPropagation(); document.getElementById('langDropdown').classList.toggle('show'); }

        function changeLanguage(lang) {
            document.getElementById('currentLangDisplay').innerText = lang;
            const data = translations[lang];
            Object.keys(data).forEach(key => {
                const el = document.getElementById('txt-' + key) || document.getElementById(key);
                if (el) {
                    if (key.includes('title')) el.innerHTML = data[key];
                    else el.innerText = data[key];
                }
            });
            document.querySelectorAll('.lang-option').forEach(opt => opt.classList.toggle('active', opt.dataset.lang === lang));
            document.getElementById('langDropdown').classList.remove('show');
            localStorage.setItem('selectedLang', lang);
        }

        function alertReady(name) {
            const lang = localStorage.getItem('selectedLang') || 'KO';
            const areaKey = 'reg-' + name.toLowerCase();
            const areaName = translations[lang][areaKey] || name;
            alert(areaName + translations[lang]['alert-ready']);
        }

        window.onclick = () => document.getElementById('langDropdown').classList.remove('show');
        window.onload = () => changeLanguage(localStorage.getItem('selectedLang') || 'KO');
    </script>
</body>
</html>
