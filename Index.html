<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K Regional Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pb-safe { padding-bottom: calc(5.5rem + env(safe-area-inset-bottom)); }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .category-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #f1f5f9;
        }
        .category-card:active { transform: scale(0.95); }
        .icon-wrapper {
            width: 3.25rem;
            height: 3.25rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94a3b8; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: #4f46e5; }
        
        #main-content { transition: opacity 0.2s ease-in-out; }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 언어 선택 드롭다운 애니메이션 */
        #lang-dropdown {
            display: none;
            transform-origin: top right;
            animation: dropdownScale 0.2s ease-out forwards;
        }
        @keyframes dropdownScale {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative">
        
        <!-- Header -->
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <button id="back-btn" onclick="goHome()" class="p-1.5 -ml-1 rounded-full hover:bg-slate-100 transition-colors invisible">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h1 class="text-2xl font-black gradient-text tracking-tighter cursor-pointer" onclick="goHome()">Quest-K</h1>
            </div>
            
            <div class="flex items-center gap-2 relative">
                <!-- 언어 선택 버튼 -->
                <button id="lang-btn" onclick="toggleLangDropdown(event)" class="bg-[#f1f5f9] px-3 py-1.5 rounded-full text-[0.75rem] font-bold text-slate-600 border border-slate-200 hover:bg-slate-200 transition-all flex items-center gap-1.5">
                    <span class="text-blue-500">🌐</span> <span id="current-lang-label">KO</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
                </button>

                <!-- 언어 선택 드롭다운 리스트 -->
                <div id="lang-dropdown" class="absolute right-0 top-full mt-2 w-32 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden z-[110]">
                    <div class="flex flex-col p-1">
                        <button onclick="selectLanguage('KO')" class="flex items-center gap-2 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-colors">
                            <span>🇰🇷</span> 한국어
                        </button>
                        <button onclick="selectLanguage('EN')" class="flex items-center gap-2 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-colors">
                            <span>🇺🇸</span> English
                        </button>
                        <button onclick="selectLanguage('JP')" class="flex items-center gap-2 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-colors">
                            <span>🇯🇵</span> 日本語
                        </button>
                    </div>
                </div>

                <button class="p-2 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg></button>
            </div>
        </header>

        <!-- Content Area -->
        <main id="main-content" class="flex-grow pb-safe overflow-y-auto">
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <button id="nav-home" class="nav-item active" onclick="goHome()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span data-lang="nav-home">홈</span>
            </button>
            <button id="nav-mission" class="nav-item" onclick="loadExternalPage('Mission.html', 'mission')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                <span data-lang="nav-mission">미션</span>
            </button>
            <button id="nav-rank" class="nav-item" onclick="loadExternalPage('Rank.html', 'rank')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                <span data-lang="nav-rank">랭킹</span>
            </button>
            <button id="nav-history" class="nav-item" onclick="loadExternalPage('History.html', 'history')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                <span data-lang="nav-history">기록</span>
            </button>
        </nav>
    </div>

    <!-- Home Template -->
    <script type="text/template" id="tpl-home">
        <section class="px-5 mt-6">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2rem] p-7 text-white shadow-xl h-48 flex flex-col justify-center">
                <h2 class="text-2xl font-black leading-tight" data-lang="banner-title">광고 시청 시<br>포인트 2배 보상!</h2>
                <p class="text-sm text-indigo-100 mt-2" data-lang="banner-sub">상위 랭킹 도전의 지름길</p>
            </div>
        </section>

        <!-- 지역 선택 섹션 -->
        <section class="px-5 mt-10">
            <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-indigo-600 rounded-full"></span>
                <span data-lang="home-title">어디로 가시나요?</span>
            </h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="category-card" onclick="loadExternalPage('Seoul.html', 'home')">
                    <div class="icon-wrapper bg-orange-50 text-orange-500">🏙️</div><span class="text-[0.7rem] font-black" data-lang="reg-seoul">서울</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Gyeonggi.html', 'home')">
                    <div class="icon-wrapper bg-blue-50 text-blue-500">🏰</div><span class="text-[0.7rem] font-black" data-lang="reg-gyeonggi">경기</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Gangwon.html', 'home')">
                    <div class="icon-wrapper bg-green-50 text-green-500">🌲</div><span class="text-[0.7rem] font-black" data-lang="reg-gangwon">강원</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Chungcheong.html', 'home')">
                    <div class="icon-wrapper bg-yellow-50 text-yellow-600">🌳</div><span class="text-[0.7rem] font-black" data-lang="reg-chungcheong">충청</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Jeonla.html', 'home')">
                    <div class="icon-wrapper bg-purple-50 text-purple-500">🥘</div><span class="text-[0.7rem] font-black" data-lang="reg-jeonla">전라</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Gyeongsang.html', 'home')">
                    <div class="icon-wrapper bg-indigo-50 text-indigo-500">🌉</div><span class="text-[0.7rem] font-black" data-lang="reg-gyeongsang">경상</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Jeju.html', 'home')">
                    <div class="icon-wrapper bg-red-50 text-red-500">🗿</div><span class="text-[0.7rem] font-black" data-lang="reg-jeju">제주</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Anywhere.html', 'home')">
                    <div class="icon-wrapper bg-gray-100 text-gray-500">🌍</div><span class="text-[0.7rem] font-black" data-lang="reg-anywhere">전국</span>
                </div>
            </div>
        </section>

        <!-- 미션 카테고리 섹션 -->
        <section class="px-5 mt-10 mb-10">
            <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-purple-600 rounded-full"></span>
                <span data-lang="mission-cat-title">어떤 미션을 하고 싶나요?</span>
            </h3>
            <div class="grid grid-cols-5 gap-2">
                <!-- 지정하신 파일 이름으로 매칭 완료 -->
                <div class="category-card" onclick="loadExternalPage('Food.html', 'home')">
                    <div class="icon-wrapper !w-11 !h-11 !text-xl bg-red-50 text-red-500">🍎</div>
                    <span class="text-[0.65rem] font-bold" data-lang="cat-food">음식</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Music.html', 'home')">
                    <div class="icon-wrapper !w-11 !h-11 !text-xl bg-pink-50 text-pink-500">🎵</div>
                    <span class="text-[0.65rem] font-bold" data-lang="cat-music">음악</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Photozone.html', 'home')">
                    <div class="icon-wrapper !w-11 !h-11 !text-xl bg-cyan-50 text-cyan-500">📸</div>
                    <span class="text-[0.65rem] font-bold" data-lang="cat-photo">포토존</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('K-life.html', 'home')">
                    <div class="icon-wrapper !w-11 !h-11 !text-xl bg-emerald-50 text-emerald-500">🏠</div>
                    <span class="text-[0.65rem] font-bold" data-lang="cat-klife">K라이프</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Activity.html', 'home')">
                    <div class="icon-wrapper !w-11 !h-11 !text-xl bg-amber-50 text-amber-500">🏃</div>
                    <span class="text-[0.65rem] font-bold" data-lang="cat-activity">액티비티</span>
                </div>
            </div>
        </section>
    </script>

    <script>
        const contentArea = document.getElementById('main-content');
        const backBtn = document.getElementById('back-btn');
        const langDropdown = document.getElementById('lang-dropdown');

        const mainI18n = {
            KO: {
                "nav-home": "홈", "nav-mission": "미션", "nav-rank": "랭킹", "nav-history": "기록",
                "banner-title": "광고 시청 시<br>포인트 2배 보상!", "banner-sub": "상위 랭킹 도전의 지름길",
                "home-title": "어디로 가시나요?", "reg-seoul": "서울", "reg-gyeonggi": "경기", "reg-gangwon": "강원",
                "reg-chungcheong": "충청", "reg-jeonla": "전라", "reg-gyeongsang": "경상", "reg-jeju": "제주", "reg-anywhere": "전국",
                "mission-cat-title": "어떤 미션을 하고 싶나요?",
                "cat-food": "음식", "cat-music": "음악", "cat-photo": "포토존", "cat-klife": "K라이프", "cat-activity": "액티비티"
            },
            EN: {
                "nav-home": "Home", "nav-mission": "Mission", "nav-rank": "Rank", "nav-history": "History",
                "banner-title": "Watch Ads<br>Get 2x Points!", "banner-sub": "Fastest way to rank up",
                "home-title": "Where to go?", "reg-seoul": "Seoul", "reg-gyeonggi": "Gyeonggi", "reg-gangwon": "Gangwon",
                "reg-chungcheong": "Chungcheong", "reg-jeonla": "Jeonla", "reg-gyeongsang": "Gyeongsang", "reg-jeju": "Jeju", "reg-anywhere": "All",
                "mission-cat-title": "Choose your mission",
                "cat-food": "Food", "cat-music": "Music", "cat-photo": "Photozone", "cat-klife": "K-Life", "cat-activity": "Activity"
            },
            JP: {
                "nav-home": "ホーム", "nav-mission": "ミッション", "nav-rank": "ランキング", "nav-history": "記録",
                "banner-title": "広告視聴で<br>ポイント2倍！", "banner-sub": "ランキングへの近道",
                "home-title": "どこへ行きますか？", "reg-seoul": "ソウル", "reg-gyeonggi": "京畿", "reg-gangwon": "江原",
                "reg-chungcheong": "忠清", "reg-jeonla": "全羅", "reg-gyeongsang": "慶尚", "reg-jeju": "済州", "reg-anywhere": "全国",
                "mission-cat-title": "ミッションを選んでください",
                "cat-food": "グルメ", "cat-music": "音楽", "cat-photo": "フォト", "cat-klife": "Kライフ", "cat-activity": "活動"
            }
        };

        function toggleLangDropdown(e) {
            e.stopPropagation();
            const isOpen = langDropdown.style.display === 'block';
            langDropdown.style.display = isOpen ? 'none' : 'block';
        }

        function selectLanguage(langCode) {
            localStorage.setItem('selectedLang', langCode);
            applyMainLanguage();
            langDropdown.style.display = 'none';
        }

        window.addEventListener('click', () => {
            langDropdown.style.display = 'none';
        });

        function applyMainLanguage() {
            const savedLang = localStorage.getItem('selectedLang') || 'KO';
            document.getElementById('current-lang-label').innerText = savedLang;
            
            const dictionary = mainI18n[savedLang];
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (dictionary[key]) el.innerHTML = dictionary[key];
            });
        }

        async function loadExternalPage(fileName, navId) {
            contentArea.classList.add('fade-out');
            contentArea.innerHTML = '<div class="flex justify-center pt-20"><div class="loader"></div></div>';

            try {
                const response = await fetch(`./${fileName}?v=${Date.now()}`);
                if (!response.ok) throw new Error(`파일 로드 실패`);
                const html = await response.text();
                
                setTimeout(() => {
                    contentArea.innerHTML = html;
                    
                    const scripts = contentArea.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        document.body.appendChild(newScript);
                        document.body.removeChild(newScript);
                    });

                    contentArea.classList.remove('fade-out');
                    contentArea.classList.add('fade-in');
                    
                    updateNav(navId);
                    backBtn.classList.remove('invisible');
                    window.scrollTo(0, 0);
                    applyMainLanguage(); 
                }, 100);
            } catch (error) {
                // 파일이 없을 경우 에러 메시지와 함께 버튼으로 홈 이동 유도
                contentArea.innerHTML = `<div class="p-10 text-center text-slate-400">
                    <p class="mb-2 text-slate-500 font-bold">${fileName} 페이지를 찾을 수 없습니다.</p>
                    <p class="text-xs mb-6">해당 콘텐츠는 준비 중이거나 파일이 존재하지 않습니다.</p>
                    <button onclick="goHome()" class="px-6 py-2 bg-indigo-600 text-white rounded-full font-bold shadow-lg">홈으로 이동</button>
                </div>`;
            }
        }

        function goHome() {
            contentArea.classList.add('fade-out');
            setTimeout(() => {
                contentArea.innerHTML = document.getElementById('tpl-home').innerHTML;
                contentArea.classList.remove('fade-out');
                contentArea.classList.add('fade-in');
                updateNav('home');
                backBtn.classList.add('invisible');
                window.scrollTo(0, 0);
                applyMainLanguage();
            }, 100);
        }

        function updateNav(navId) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            const targetNav = document.getElementById('nav-' + navId);
            if (targetNav) targetNav.classList.add('active');
        }

        window.onload = () => {
            goHome();
        };
    </script>
</body>
</html>
