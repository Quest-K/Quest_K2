<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K Regional Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* index.html의 <style> 안에 추가 */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
        .pb-safe { padding-bottom: calc(5.5rem + env(safe-area-inset-bottom)); }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .category-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #f1f5f9;
        }
        .category-card:active { transform: scale(0.95); }
        .icon-wrapper {
            width: 3.25rem;
            height: 3.25rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94a3b8; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: #4f46e5; }
        
        #main-content { transition: opacity 0.2s ease-in-out; }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        /**
         * [DEBUG SYSTEM] 모바일 에러 포착
         */
        window.onerror = function(message, source, lineno, colno, error) {
            const errorMsg = `[JS Error] ${message}\nLine: ${lineno}\nFile: ${source}`;
            console.error(errorMsg);
            // alert(errorMsg); // 실제 서비스 시에는 주석 처리, 디버깅 시에는 해제
            return false;
        };

        window.onunhandledrejection = function(event) {
            const msg = `[Promise Error] ${event.reason}`;
            console.error(msg);
            alert(msg);
        };
    </script>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative">
        
        <!-- Header -->
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <button id="back-btn" onclick="goHome()" class="p-1.5 -ml-1 rounded-full hover:bg-slate-100 transition-colors invisible">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h1 class="text-2xl font-black gradient-text tracking-tighter cursor-pointer" onclick="goHome()">Quest-K</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="changeLanguage()" class="bg-[#f1f5f9] px-3 py-1.5 rounded-full text-[0.75rem] font-bold text-slate-600 border border-slate-200">
                    <span class="text-blue-500">🌐</span> <span id="current-lang-label">KO</span>
                </button>
                <button class="p-2 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg></button>
            </div>
        </header>

        <!-- Content Area -->
        <main id="main-content" class="flex-grow pb-safe overflow-y-auto">
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <button id="nav-home" class="nav-item active" onclick="goHome()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>홈</span>
            </button>
            <button id="nav-mission" class="nav-item" onclick="loadExternalPage('Mission.html', 'mission')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                <span>미션</span>
            </button>
            <button id="nav-rank" class="nav-item" onclick="loadExternalPage('Rank.html', 'rank')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                <span>랭킹</span>
            </button>
            <button id="nav-history" class="nav-item" onclick="loadExternalPage('History.html', 'history')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                <span>기록</span>
            </button>
        </nav>
    </div>

    <!-- Home Template -->
    <script type="text/template" id="tpl-home">
        <section class="px-5 mt-6">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2rem] p-7 text-white shadow-xl h-48 flex flex-col justify-center">
                <h2 class="text-2xl font-black leading-tight">광고 시청 시<br>포인트 2배 보상!</h2>
                <p class="text-sm text-indigo-100 mt-2">상위 랭킹 도전의 지름길</p>
            </div>
        </section>

        <section class="px-5 mt-12 mb-10">
            <h3 class="text-2xl font-black text-slate-900 mb-6">어디로 가시나요?</h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="category-card" onclick="loadExternalPage('Seoul.html', 'home')">
                    <div class="icon-wrapper bg-orange-50 text-orange-500">🏙️</div><span class="text-xs font-black">서울</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Gyeonggi.html', 'home')">
                    <div class="icon-wrapper bg-blue-50 text-blue-500">🏰</div><span class="text-xs font-black">경기</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Gangwon.html', 'home')">
                    <div class="icon-wrapper bg-green-50 text-green-500">🌲</div><span class="text-xs font-black">강원</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Chungcheong.html', 'home')">
                    <div class="icon-wrapper bg-yellow-50 text-yellow-600">🌳</div><span class="text-xs font-black">충청</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Jeonla.html', 'home')">
                    <div class="icon-wrapper bg-purple-50 text-purple-500">🥘</div><span class="text-xs font-black">전라</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Gyeongsang.html', 'home')">
                    <div class="icon-wrapper bg-indigo-50 text-indigo-500">🌉</div><span class="text-xs font-black">경상</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Jeju.html', 'home')">
                    <div class="icon-wrapper bg-red-50 text-red-500">🗿</div><span class="text-xs font-black">제주</span>
                </div>
                <div class="category-card" onclick="loadExternalPage('Anywhere.html', 'home')">
                    <div class="icon-wrapper bg-gray-100 text-gray-500">🌍</div><span class="text-xs font-black">전국</span>
                </div>
            </div>
        </section>
    </script>

    <script>
        const contentArea = document.getElementById('main-content');
        const backBtn = document.getElementById('back-btn');

        async function loadExternalPage(fileName, navId) {
            contentArea.classList.add('fade-out');
            contentArea.innerHTML = '<div class="flex justify-center pt-20"><div class="loader"></div></div>';

            try {
                // 경로 앞에 ./ 추가 및 캐시 방지 파라미터(v=) 추가
                const response = await fetch(`./${fileName}?v=${Date.now()}`);
                if (!response.ok) throw new Error(`파일을 찾을 수 없습니다: ${fileName}`);
                const html = await response.text();
                
                setTimeout(() => {
                    contentArea.innerHTML = html;
                    
                    // [IMPORTANT] 불러온 HTML 내부의 <script>를 수동으로 다시 실행
                    const scripts = contentArea.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        document.body.appendChild(newScript); // body에 추가해야 즉시 실행됨
                        document.body.removeChild(newScript); // 실행 후 정리
                    });

                    contentArea.classList.remove('fade-out');
                    contentArea.classList.add('fade-in');
                    
                    updateNav(navId);
                    backBtn.classList.remove('invisible');
                    window.scrollTo(0, 0);
                }, 100);
            } catch (error) {
                alert("로드 에러: " + error.message);
                contentArea.innerHTML = `
                    <div class="p-10 text-center">
                        <p class="text-slate-400">페이지 로드 실패<br>(${fileName})</p>
                        <button onclick="goHome()" class="mt-4 text-indigo-600 font-bold">홈으로 돌아가기</button>
                    </div>`;
                contentArea.classList.remove('fade-out');
            }
        }

        function goHome() {
            contentArea.classList.add('fade-out');
            setTimeout(() => {
                contentArea.innerHTML = document.getElementById('tpl-home').innerHTML;
                contentArea.classList.remove('fade-out');
                contentArea.classList.add('fade-in');
                updateNav('home');
                backBtn.classList.add('invisible');
                window.scrollTo(0, 0);
            }, 100);
        }

        function updateNav(navId) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            const targetNav = document.getElementById('nav-' + navId);
            if (targetNav) targetNav.classList.add('active');
        }

        function changeLanguage() {
            const current = localStorage.getItem('selectedLang') === 'EN' ? 'KO' : 'EN';
            localStorage.setItem('selectedLang', current);
            document.getElementById('current-lang-label').innerText = current;
            location.reload();
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('selectedLang') || 'KO';
            document.getElementById('current-lang-label').innerText = savedLang;
            goHome();
        };
    </script>
</body>
</html>
