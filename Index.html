<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K | Journey of Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        
        .pb-safe { padding-bottom: calc(8rem + env(safe-area-inset-bottom)); }
        
        /* 브랜드 컬러 설정 */
        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }

        .category-card { 
            background: white; 
            border-radius: 1.5rem; 
            padding: 1rem 0.25rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(10, 25, 49, 0.04); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #f1f5f9; 
            min-height: 105px; 
            justify-content: center; 
        }
        .category-card:active { transform: scale(0.95); background: #f8fafc; }
        
        .icon-wrapper { 
            width: 3.2rem; 
            height: 3.2rem; 
            border-radius: 1.1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            margin-bottom: 0.6rem; 
            background: #F8FAFC; 
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; transition: all 0.2s; flex: 1; }
        .nav-item.active { color: #1E5128; } /* 현재 페이지 강조 컬러 */
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C] overflow-x-hidden">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">
        
        <header class="bg-white/95 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-900 brand-navy tracking-tighter cursor-pointer" onclick="location.href='index.html'">Quest-K</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div id="display-nickname" class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">GUEST</div>
                    <div id="display-points" class="text-sm font-900 text-[#1E5128]">0P</div> 
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 overflow-hidden shadow-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" alt="avatar">
                </div>
            </div>
        </header>

        <main class="flex-grow pb-safe overflow-y-auto fade-in">
            
            <section class="px-6 mt-6">
                <div class="bg-brand-navy rounded-[2.5rem] p-8 text-white h-48 flex flex-col justify-center relative overflow-hidden shadow-xl">
                    <div class="relative z-10">
                        <h2 class="text-2xl font-900 leading-tight">광고 시청 시<br><span class="text-[#89FFA5]">포인트 2배</span> 보상!</h2> 
                        <p class="text-sm text-slate-300 mt-2 font-medium">상위 랭킹 도전의 지름길 💎</p>
                    </div>
                    <div class="absolute -right-16 -bottom-16 w-52 h-52 bg-brand-green rounded-full opacity-20 blur-3xl"></div>
                </div>
            </section>

            <section class="px-6 mt-10">
                <h3 class="text-xl font-900 brand-navy mb-5 flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-brand-green rounded-full"></span>어디로 가시나요? 
                </h3>
                <div class="grid grid-cols-4 gap-3">
                    <div class="category-card" onclick="goToMission('region', '서울')"><div class="icon-wrapper">🏙️</div><span class="text-[0.7rem] font-800">서울</span></div>
                    <div class="category-card" onclick="goToMission('region', '경기')"><div class="icon-wrapper">🏰</div><span class="text-[0.7rem] font-800">경기</span></div>
                    <div class="category-card" onclick="goToMission('region', '강원')"><div class="icon-wrapper">🌲</div><span class="text-[0.7rem] font-800">강원</span></div>
                    <div class="category-card" onclick="goToMission('region', '제주')"><div class="icon-wrapper">🗿</div><span class="text-[0.7rem] font-800">제주</span></div>
                    <div class="category-card" onclick="goToMission('region', '전라')"><div class="icon-wrapper">🥘</div><span class="text-[0.7rem] font-800">전라</span></div>
                    <div class="category-card" onclick="goToMission('region', '경상')"><div class="icon-wrapper">⚓</div><span class="text-[0.7rem] font-800">경상</span></div>
                    <div class="category-card" onclick="goToMission('region', '충청')"><div class="icon-wrapper">🌾</div><span class="text-[0.7rem] font-800">충청</span></div>
                    <div class="category-card" onclick="goToMission('region', '전국공통')"><div class="icon-wrapper">🌍</div><span class="text-[0.7rem] font-800">전국</span></div>
                </div>
            </section>

            <section class="px-6 mt-12 mb-10">
                <h3 class="text-xl font-900 brand-navy mb-5 flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-brand-green rounded-full"></span>어떤 미션을 할까요?
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex items-center gap-4 bg-white border border-slate-100 p-5 rounded-[1.8rem] shadow-sm active:scale-95 transition-all" onclick="goToMission('category', 'K-Food')">
                        <div class="text-3xl">🥘</div>
                        <div><p class="text-xs font-800 text-slate-400">FOOD</p><p class="text-base font-900 brand-navy">K-음식</p></div>
                    </div>
                    <div class="flex items-center gap-4 bg-white border border-slate-100 p-5 rounded-[1.8rem] shadow-sm active:scale-95 transition-all" onclick="goToMission('category', 'Nature')">
                        <div class="text-3xl">🏔️</div>
                        <div><p class="text-xs font-800 text-slate-400">NATURE</p><p class="text-base font-900 brand-navy">자연</p></div>
                    </div>
                    <div class="flex items-center gap-4 bg-white border border-slate-100 p-5 rounded-[1.8rem] shadow-sm active:scale-95 transition-all" onclick="goToMission('category', 'History')">
                        <div class="text-3xl">🏯</div>
                        <div><p class="text-xs font-800 text-slate-400">HISTORY</p><p class="text-base font-900 brand-navy">역사</p></div>
                    </div>
                    <div class="flex items-center gap-4 bg-white border border-slate-100 p-5 rounded-[1.8rem] shadow-sm active:scale-95 transition-all" onclick="goToMission('category', 'K-Life')">
                        <div class="text-3xl">🏠</div>
                        <div><p class="text-xs font-800 text-slate-400">K-LIFE</p><p class="text-base font-900 brand-navy">라이프</p></div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(10,25,49,0.06)]">
            <button class="nav-item active" onclick="location.href='index.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span>미션</span>
            </button>
            <button class="nav-item" onclick="location.href='Wish.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                <span>찜</span>
            </button>
            <button class="nav-item" onclick="location.href='History.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                <span>기록</span>
            </button>
            <button class="nav-item" onclick="location.href='mypage.html'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                <span>마이</span>
            </button>
        </nav>
    </div>

    <script>
        // 1 & 2. 미션 리스트 이동 함수 (필터링 포함)
        function goToMission(type, value) {
            // URL 파라미터로 데이터 전달 (예: mission.html?type=region&value=서울)
            location.href = `mission.html?type=${type}&value=${encodeURIComponent(value)}`;
        }

        window.onload = () => {
            console.log("Quest-K Navigation System Ready");
        };
    </script>
</body>
</html>
