<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pb-safe { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* 공통 상단바/하단바 스타일 */
        .lang-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: white;
            min-width: 140px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid #f1f5f9;
        }
        .lang-dropdown.show { display: block; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94a3b8; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #4f46e5; }
        
        /* 로딩 애니메이션 (선택사항) */
        .loader { border-top-color: #4f46e5; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="max-w-2xl mx-auto min-h-screen pb-safe flex flex-col">
        
        <header class="bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-2">
                <button id="back-btn" onclick="goBack()" class="p-1.5 -ml-1 rounded-full hover:bg-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h1 class="text-2xl font-black gradient-text tracking-tighter cursor-pointer" onclick="loadPage('Home_content.html', 'nav-home')">Quest-K</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="lang-container relative">
                    <button class="bg-[#f1f5f9] px-3 py-1.5 rounded-full text-[0.75rem] font-bold text-slate-600 flex items-center gap-1 border border-slate-200 shadow-sm" onclick="toggleLangDropdown(event)">
                        <span class="text-blue-500">🌐</span> <span id="currentLangDisplay">KO</span>
                    </button>
                    <div id="langDropdown" class="lang-dropdown">
                        <div class="p-3 hover:bg-slate-50 cursor-pointer" onclick="changeLanguage('KO')">🇰🇷 한국어</div>
                        <div class="p-3 hover:bg-slate-50 cursor-pointer" onclick="changeLanguage('EN')">🇺🇸 English</div>
                        <div class="p-3 hover:bg-slate-50 cursor-pointer" onclick="changeLanguage('JP')">🇯🇵 日本語</div>
                    </div>
                </div>
            </div>
        </header>

        <div id="content-area" class="flex-grow">
            <div class="flex justify-center items-center h-64">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 backdrop-blur-2xl border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <button id="nav-home" class="nav-item active" onclick="loadPage('Home_content.html', 'nav-home')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>홈</span>
            </button>
            <button id="nav-mission" class="nav-item" onclick="loadPage('Mission.html', 'nav-mission')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg><span>미션</span>
            </button>
            <button id="nav-rank" class="nav-item" onclick="loadPage('Rank.html', 'nav-rank')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg><span>랭킹</span>
            </button>
            <button id="nav-history" class="nav-item" onclick="loadPage('History.html', 'nav-history')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg><span>기록</span>
            </button>
        </nav>
    </div>

    <script>
        /**
         * 페이지 전환 함수
         * @param {string} url - 불러올 HTML 파일 경로
         * @param {string} navId - 활성화할 하단바 버튼 ID
         */
        async function loadPage(url, navId) {
            const contentArea = document.getElementById('content-area');
            
            try {
                // 1. 파일 가져오기
                const response = await fetch(url);
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                const html = await response.text();
                
                // 2. 본문 교체
                contentArea.innerHTML = html;
                
                // 3. 하단바 아이콘 색상 변경
                if (navId) {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    const activeNav = document.getElementById(navId);
                    if (activeNav) activeNav.classList.add('active');
                }
                
                // 4. 페이지 상단으로 스크롤
                window.scrollTo(0, 0);

                // 5. 브라우저 주소창에 기록 남기기 (뒤로가기 지원용 - 선택사항)
                // history.pushState({url, navId}, '', '#'+url.replace('.html', ''));
                
            } catch (error) {
                contentArea.innerHTML = `<div class="p-10 text-center text-slate-400">${url} 파일을 불러오는 중 오류가 발생했습니다.</div>`;
            }
        }

        // 언어 설정 및 드롭다운 (기존 로직 유지)
        function toggleLangDropdown(e) { 
            e.stopPropagation(); 
            document.getElementById('langDropdown').classList.toggle('show'); 
        }

        function changeLanguage(lang) {
            document.getElementById('currentLangDisplay').innerText = lang;
            document.getElementById('langDropdown').classList.remove('show');
            localStorage.setItem('selectedLang', lang);
            // 언어 변경 시 현재 페이지 다시 로드하거나 번역 로직 실행
        }

        function goBack() {
            // 간단하게 홈으로 보내거나 브라우저 뒤로가기
            loadPage('Home_content.html', 'nav-home');
        }

        // 초기 화면 설정 (접속 시 바로 홈 콘텐츠 로드)
        window.onload = () => {
            const savedLang = localStorage.getItem('selectedLang') || 'KO';
            document.getElementById('currentLangDisplay').innerText = savedLang;
            loadPage('Home_content.html', 'nav-home');
        };

        window.onclick = () => document.getElementById('langDropdown').classList.remove('show');
    </script>
</body>
</html>
