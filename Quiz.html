<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50">
<div id="quiz-app-container" class="max-w-2xl mx-auto px-5 py-6 fade-in min-h-screen bg-white relative shadow-xl">
    <!-- AI Translation Overlay -->
    <div id="ai-loading" class="hidden absolute inset-0 bg-white/90 backdrop-blur-md z-[200] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-indigo-600 font-black animate-pulse text-sm" id="loading-msg">AI is optimizing the quiz for you...</p>
    </div>

    <!-- Header Section -->
    <div class="flex justify-between items-end mb-6">
        <div>
            <span id="quiz-cat" class="bg-indigo-600 text-white text-[10px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow-sm">K-Culture</span>
            <h2 class="text-2xl font-black text-slate-900 mt-2 tracking-tight" data-quiz-lang="title">Daily Quiz</h2>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5" data-quiz-lang="q-label">Question</p>
            <p class="text-xl font-black text-indigo-600 leading-none"><span id="q-num">1</span><span class="text-slate-300 mx-1">/</span><span id="q-total">5</span></p>
        </div>
    </div>

    <!-- Progress Tracker -->
    <div class="w-full h-2.5 bg-slate-200 rounded-full mb-8 overflow-hidden shadow-inner">
        <div id="q-progress" class="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-600 transition-all duration-700 ease-out" style="width: 0%"></div>
    </div>

    <!-- Quiz Card -->
    <div id="q-card" class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-slate-200/50 border border-slate-100 mb-8 min-h-[260px] flex items-center justify-center relative overflow-hidden transition-all">
        <p id="q-text" class="text-xl font-bold text-slate-800 text-center leading-relaxed antialiased">
            Preparing your mission...
        </p>
        
        <!-- Flash Feedback -->
        <div id="q-feedback" class="absolute inset-0 flex items-center justify-center bg-white/80 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300 transform scale-110">
            <span id="q-feedback-icon" class="text-8xl drop-shadow-2xl"></span>
        </div>
    </div>

    <!-- Option Selection -->
    <div id="q-options" class="grid grid-cols-1 gap-4 mb-12">
        <!-- Buttons injected by JS -->
    </div>

    <!-- Result Dashboard -->
    <div id="q-result" class="hidden fixed inset-0 bg-white z-[150] flex flex-col items-center justify-center p-8 text-center animate-[fadeIn_0.5s_ease-out]">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-yellow-400 blur-3xl opacity-20 animate-pulse"></div>
            <span class="text-7xl relative">🏆</span>
        </div>
        <h3 class="text-3xl font-black text-slate-900 mb-3" data-quiz-lang="res-title">Perfect Mission!</h3>
        <p class="text-slate-500 mb-10 font-medium leading-relaxed" data-quiz-lang="res-sub">You've mastered the essential Korean travel knowledge.</p>
        
        <div class="w-full max-w-sm bg-slate-50 rounded-[2.5rem] p-8 mb-10 border border-slate-100 shadow-sm">
            <div class="grid grid-cols-2 gap-4">
                <div class="text-center border-r border-slate-200">
                    <p class="text-[11px] text-slate-400 font-bold uppercase mb-1" data-quiz-lang="res-correct">Score</p>
                    <p id="res-count" class="text-3xl font-black text-slate-800">0 / 5</p>
                </div>
                <div class="text-center">
                    <p class="text-[11px] text-slate-400 font-bold uppercase mb-1" data-quiz-lang="res-reward">Points</p>
                    <p id="res-points" class="text-3xl font-black text-indigo-600">+0P</p>
                </div>
            </div>
        </div>

        <button onclick="window.history.back()" class="w-full max-w-sm bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-2xl shadow-slate-300 active:scale-95 transition-all" data-quiz-lang="btn-close">
            Confirm & Return
        </button>
    </div>
</div>

<script>
    (function() {
        const apiKey = ""; 
        const translationCache = new Map();
        
        const baseContent = {
            ui: {
                title: "미션 마스터 퀴즈", qLabel: "질문", resTitle: "미션 완료!", resSub: "한국 여행 전문가로 인정받으셨습니다!",
                resCorrect: "맞힌 개수", resReward: "획득 포인트", btnClose: "확인 및 돌아가기", loading: "AI가 당신을 위해 퀴즈를 준비 중입니다..."
            },
            data: [
                { cat: '음식', q: "삼겹살을 먹은 후 밥을 볶아 먹는 문화를 무엇이라 할까요?", opts: ["비빔밥", "볶음밥", "덮밥", "주먹밥"], ans: 1 },
                { cat: 'K-라이프', q: "양머리 수건을 쓰고 식혜와 맥반석 달걀을 즐기는 이곳은?", opts: ["노래방", "PC방", "찜질방", "미용실"], ans: 2 },
                { cat: '음악', q: "방탄소년단(BTS)의 명소를 찾아다니는 여행 문화를 무엇이라 하나요?", opts: ["방탄 투어", "K팝 순례", "아이돌 캠프", "뮤직 로드"], ans: 0 },
                { cat: '포토존', q: "한복을 입으면 입장료가 면제되는 서울의 대표 궁궐은?", opts: ["경복궁", "남산타워", "롯데월드", "코엑스"], ans: 0 },
                { cat: '액티비티', q: "서울 한강에서 쉽게 빌려 탈 수 있는 공공자전거의 이름은?", opts: ["씽씽이", "따릉이", "타슈", "어울링"], ans: 1 }
            ]
        };

        let currentData = null;
        let currentIdx = 0;
        let score = 0;

        async function startApp() {
            const targetLang = localStorage.getItem('selectedLang') || 'KO';
            
            if (targetLang === 'KO') {
                currentData = baseContent;
            } else if (translationCache.has(targetLang)) {
                currentData = translationCache.get(targetLang);
            } else {
                currentData = await fetchTranslation(targetLang);
                translationCache.set(targetLang, currentData);
            }

            applyLayout();
            renderStep();
        }

        async function fetchTranslation(lang) {
            const loader = document.getElementById('ai-loading');
            loader.classList.remove('hidden');
            
            const prompt = `You are a professional translator. Translate this Korean Travel Mission Quiz JSON into ${lang}. 
            Maintain the exact JSON structure. Do not change the 'ans' (index) values.
            JSON: ${JSON.stringify(baseContent)}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const result = await response.json();
                return JSON.parse(result.candidates[0].content.parts[0].text);
            } catch (error) {
                console.error("AI Translation Error:", error);
                return baseContent; 
            } finally {
                loader.classList.add('hidden');
            }
        }

        function applyLayout() {
            const ui = currentData.ui;
            document.querySelectorAll('[data-quiz-lang]').forEach(el => {
                const key = el.getAttribute('data-quiz-lang');
                if (ui[key]) el.innerHTML = ui[key];
            });
            const lmsg = document.getElementById('loading-msg');
            if(lmsg) lmsg.innerText = ui.loading;
        }

        function renderStep() {
            const item = currentData.data[currentIdx];
            const qNum = currentIdx + 1;
            const total = currentData.data.length;

            document.getElementById('q-num').innerText = qNum;
            document.getElementById('q-total').innerText = total;
            document.getElementById('q-progress').style.width = (qNum / total * 100) + '%';
            document.getElementById('quiz-cat').innerText = item.cat;
            document.getElementById('q-text').innerText = item.q;

            const container = document.getElementById('q-options');
            container.innerHTML = '';
            
            item.opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "group w-full bg-white border border-slate-200 py-5 px-6 rounded-2xl text-left font-bold text-slate-700 shadow-sm active:scale-[0.98] active:bg-indigo-50 transition-all flex items-center hover:border-indigo-300";
                btn.innerHTML = `
                    <span class="w-10 h-10 flex items-center justify-center bg-slate-50 group-hover:bg-indigo-100 rounded-xl text-sm mr-5 text-slate-400 group-hover:text-indigo-600 transition-colors font-black shadow-inner">
                        ${index + 1}
                    </span> 
                    <span class="flex-1">${opt}</span>
                `;
                btn.onclick = () => processAnswer(index);
                container.appendChild(btn);
            });
        }

        function processAnswer(idx) {
            const isCorrect = idx === currentData.data[currentIdx].ans;
            if (isCorrect) score++;

            const feedback = document.getElementById('q-feedback');
            const icon = document.getElementById('q-feedback-icon');
            
            icon.innerText = isCorrect ? "⭕" : "❌";
            feedback.classList.remove('opacity-0');
            feedback.classList.add('opacity-100');
            feedback.style.transform = 'scale(1)';

            setTimeout(() => {
                feedback.classList.remove('opacity-100');
                feedback.classList.add('opacity-0');
                feedback.style.transform = 'scale(1.1)';
                
                if (currentIdx < currentData.data.length - 1) {
                    currentIdx++;
                    renderStep();
                } else {
                    displayFinalResult();
                }
            }, 900);
        }

        function displayFinalResult() {
            document.getElementById('res-count').innerText = `${score} / ${currentData.data.length}`;
            document.getElementById('res-points').innerText = `+${score * 100}P`;
            document.getElementById('q-result').classList.remove('hidden');
        }

        startApp();

        window.addEventListener('languageChanged', (e) => {
            currentIdx = 0;
            score = 0;
            document.getElementById('q-result').classList.add('hidden');
            startApp();
        });

        window.addEventListener('storage', (e) => {
            if (e.key === 'selectedLang') startApp();
        });
    })();
</script>
</body>
</html>
