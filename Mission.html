<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Missions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }

        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .mission-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(10, 25, 49, 0.03); }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #F1F8F5; color: #1E5128; text-transform: uppercase; }
        .filter-chip { flex-shrink: 0; padding: 0.5rem 1.1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: all 0.2s; white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: #1E5128; color: white; border-color: #1E5128; box-shadow: 0 4px 10px rgba(30, 81, 40, 0.2); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .pb-safe { padding-bottom: 100px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">

        <header class="bg-white/95 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <a href="Index.html" class="text-2xl font-900 brand-navy tracking-tighter no-underline">MeoGo</a>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div class="text-[10px] font-800 text-slate-400 uppercase leading-none mb-1">GUEST</div>
                    <div class="text-sm font-900 brand-green">1,250P</div>
                </div>
                <div class="w-9 h-9 rounded-full bg-slate-100 border border-slate-200 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=MeoGo" alt="avatar">
                </div>
            </div>
        </header>

        <main id="main-content" class="flex-grow pb-safe">
            <div class="bg-white/95 backdrop-blur-md px-5 py-4 sticky top-[73px] z-[90] border-b border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <button onclick="history.back()" class="text-slate-400 hover:text-slate-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <h1 id="mission-page-title" class="text-xl font-900 text-[#0A1931]">전체 미션</h1>
                </div>
                <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-3" id="region-filters"></div>
                <div class="flex gap-2 overflow-x-auto hide-scrollbar" id="category-filters"></div>
            </div>

            <div class="px-5 pt-4">
                <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-9 w-9 border-b-2 border-[#1E5128] mb-4"></div>
                    <p class="text-slate-400 font-700 text-sm">MeoGo 미션을 불러오는 중...</p>
                </div>
                <div id="mission-items" class="hidden"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/98 backdrop-blur-xl border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="Index.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span>미션</span></a>
            <a href="Wish.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg><span>찜</span></a>
            <a href="History.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg><span>기록</span></a>
            <a href="mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span>마이</span></a>
        </nav>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-[#0A1931] text-white px-6 py-3 rounded-2xl font-800 text-sm z-[200] shadow-xl transition-all duration-300 opacity-0 pointer-events-none" style="transform: translate(-50%, -10px);">
        <span id="toast-msg"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const regions = ['전체', '서울', '경기', '강원', '충청', '전라', '경상', '제주'];
        const categories = ['전체', 'Food', 'Nature', 'History', 'K-Life'];
        const categoryLabels = { '전체': '모든 카테고리', 'Food': 'Food', 'Nature': 'Nature', 'History': 'History', 'K-Life': 'K-Life' };

        let activeRegion = '전체';
        let activeCategory = '전체';

        // Wishlist managed via localStorage (synced concept with Supabase)
        function getWishlist() {
            try { return JSON.parse(localStorage.getItem('meogo_wishlist') || '[]'); } catch { return []; }
        }
        function saveWishlist(list) {
            localStorage.setItem('meogo_wishlist', JSON.stringify(list));
        }
        function isWishlisted(missionId) {
            return getWishlist().some(w => w.mission_id === missionId);
        }
        function toggleWish(missionId, missionData) {
            let list = getWishlist();
            const idx = list.findIndex(w => w.mission_id === missionId);
            if (idx >= 0) {
                list.splice(idx, 1);
                showToast('찜 목록에서 제거했습니다.');
            } else {
                list.push({ ...missionData, wished_at: new Date().toISOString() });
                showToast('찜 목록에 추가했습니다! ❤️');
            }
            saveWishlist(list);
            renderMissionCards(window._lastMissionData || []);
        }

        // History (completed missions) managed via localStorage
        function getHistory() {
            try { return JSON.parse(localStorage.getItem('meogo_history') || '[]'); } catch { return []; }
        }
        function saveHistory(list) {
            localStorage.setItem('meogo_history', JSON.stringify(list));
        }
        function isCompleted(missionId) {
            return getHistory().some(h => h.mission_id === missionId);
        }
        function completeMission(missionId, missionData) {
            let list = getHistory();
            if (list.some(h => h.mission_id === missionId)) {
                showToast('이미 완료한 미션입니다.');
                return;
            }
            list.push({ ...missionData, completed_at: new Date().toISOString() });
            saveHistory(list);
            showToast('미션을 완료했습니다! 🎉');
            renderMissionCards(window._lastMissionData || []);
        }

        // Supabase sync: try to persist wishlist/history to Supabase tables
        async function syncWishToSupabase(missionId, add) {
            try {
                if (add) {
                    await _supabase.from('wishlists').insert({ mission_id: missionId });
                } else {
                    await _supabase.from('wishlists').delete().eq('mission_id', missionId);
                }
            } catch (e) { /* Supabase table may not exist yet, localStorage is primary */ }
        }
        async function syncHistoryToSupabase(missionId) {
            try {
                await _supabase.from('completed_missions').insert({ mission_id: missionId, completed_at: new Date().toISOString() });
            } catch (e) { /* Supabase table may not exist yet, localStorage is primary */ }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -10px)';
            }, 2000);
        }

        function readParams() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');
            const value = params.get('value');
            if (type === 'region' && value) {
                activeRegion = value;
            } else if (type === 'category' && value) {
                activeCategory = value;
            }
        }

        function updateURL() {
            const params = new URLSearchParams();
            if (activeRegion !== '전체') params.set('region', activeRegion);
            if (activeCategory !== '전체') params.set('category', activeCategory);
            const qs = params.toString();
            history.replaceState(null, '', qs ? '?' + qs : 'Mission.html');
        }

        function getTitle() {
            const parts = [];
            if (activeRegion !== '전체') parts.push(activeRegion);
            if (activeCategory !== '전체') parts.push(activeCategory);
            return parts.length > 0 ? parts.join(' · ') + ' 미션' : '전체 미션';
        }

        function renderFilters() {
            const regionContainer = document.getElementById('region-filters');
            const categoryContainer = document.getElementById('category-filters');

            regionContainer.innerHTML = regions.map(r =>
                '<button onclick="setRegion(\'' + r + '\')" class="filter-chip ' + (activeRegion === r ? 'active' : '') + '">' + r + '</button>'
            ).join('');

            categoryContainer.innerHTML = categories.map(c =>
                '<button onclick="setCategory(\'' + c + '\')" class="filter-chip ' + (activeCategory === c ? 'active' : '') + '">' + (categoryLabels[c] || c) + '</button>'
            ).join('');

            document.getElementById('mission-page-title').textContent = getTitle();
        }

        function setRegion(r) {
            activeRegion = r;
            renderFilters();
            updateURL();
            fetchMissions();
        }

        function setCategory(c) {
            activeCategory = c;
            renderFilters();
            updateURL();
            fetchMissions();
        }

        function escapeAttr(str) {
            return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function renderMissionCards(data) {
            const container = document.getElementById('mission-items');
            container.innerHTML = '';

            if (!data || data.length === 0) {
                container.innerHTML = '<div class="py-20 text-center flex flex-col items-center"><span class="text-4xl mb-4">🔍</span><p class="text-slate-400 font-800">해당 조건의 미션이 없습니다.</p></div>';
                return;
            }

            data.forEach(function(item) {
                const mid = item.mission_id || item.id;
                const wished = isWishlisted(mid);
                const completed = isCompleted(mid);
                const dataJson = escapeAttr(JSON.stringify({ mission_id: mid, mission_name: item.mission_name, category: item.category, region: item.region, guide: item.guide || '' }));

                const el = document.createElement('div');
                el.className = 'mission-card fade-in';
                el.innerHTML =
                    '<div class="flex justify-between items-start mb-3">' +
                        '<span class="tag">' + (item.category || '') + '</span>' +
                        '<div class="flex items-center gap-2">' +
                            '<span class="text-[10px] text-slate-400 font-900 uppercase tracking-widest">' + (item.region || '') + '</span>' +
                            '<button onclick="handleWish(\'' + mid + '\', ' + dataJson + ')" class="transition-transform active:scale-90" title="찜하기">' +
                                (wished
                                    ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-rose-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'
                                    : '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-300 hover:text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>'
                                ) +
                            '</button>' +
                        '</div>' +
                    '</div>' +
                    '<h4 class="font-900 text-xl mb-2 text-[#0A1931] leading-tight">' + (item.mission_name || '') + '</h4>' +
                    '<p class="text-sm text-slate-500 leading-relaxed mb-6 font-medium">' + (item.guide || '한국의 고유한 문화를 체험할 수 있는 미션입니다.') + '</p>' +
                    '<div class="flex justify-between items-center pt-5 border-t border-slate-50">' +
                        '<div class="flex flex-col">' +
                            '<span class="text-[10px] text-slate-400 font-800 uppercase mb-0.5">Reward</span>' +
                            '<span class="text-[#1E5128] font-900 text-lg">💎 100P</span>' +
                        '</div>' +
                        (completed
                            ? '<span class="text-sm px-7 py-3 rounded-2xl font-900 bg-slate-100 text-slate-400">완료됨 ✓</span>'
                            : '<button onclick="handleComplete(\'' + mid + '\', ' + dataJson + ')" class="bg-[#1E5128] text-white text-sm px-7 py-3 rounded-2xl font-900 shadow-lg shadow-[#1E5128]/10 active:scale-95 transition-all">미션완료</button>'
                        ) +
                    '</div>';
                container.appendChild(el);
            });
        }

        function handleWish(missionId, missionData) {
            toggleWish(missionId, missionData);
            const adding = isWishlisted(missionId);
            syncWishToSupabase(missionId, adding);
        }

        function handleComplete(missionId, missionData) {
            if (confirm('이 미션을 완료하시겠습니까?')) {
                completeMission(missionId, missionData);
                syncHistoryToSupabase(missionId);
            }
        }

        async function fetchMissions() {
            const spinner = document.getElementById('loading-spinner');
            const container = document.getElementById('mission-items');

            spinner.classList.remove('hidden');
            container.classList.add('hidden');
            container.innerHTML = '';

            let query = _supabase.from('missions').select('*');

            if (activeRegion !== '전체') {
                query = query.eq('region', activeRegion);
            }
            if (activeCategory !== '전체') {
                query = query.ilike('category', activeCategory);
            }

            const { data, error } = await query;

            spinner.classList.add('hidden');
            container.classList.remove('hidden');

            window._lastMissionData = data || [];
            renderMissionCards(data);
        }

        // Initialize
        readParams();
        renderFilters();
        fetchMissions();
    </script>
</body>
</html>
