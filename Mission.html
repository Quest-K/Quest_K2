<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Missions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        .brand-navy { color: #0A1931; }
        .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .bg-brand-green { background-color: #1E5128; }
        .mission-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(10, 25, 49, 0.03); }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #F1F8F5; color: #1E5128; text-transform: uppercase; }
        .filter-chip { flex-shrink: 0; padding: 0.5rem 1.1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: all 0.2s; white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: #1E5128; color: white; border-color: #1E5128; box-shadow: 0 4px 10px rgba(30, 81, 40, 0.2); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .pb-safe { padding-bottom: 100px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">
        <header class="bg-white/95 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
            <a href="Index.html" class="text-2xl font-900 brand-navy tracking-tighter no-underline">MeoGo</a>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div class="text-[10px] font-800 text-slate-400 uppercase leading-none mb-1">GUEST</div>
                    <div class="text-sm font-900 brand-green">1,250P</div>
                </div>
                <div class="w-9 h-9 rounded-full bg-slate-100 border border-slate-200 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=MeoGo" alt="avatar">
                </div>
            </div>
        </header>

        <main class="flex-grow pb-safe">
            <div class="bg-white/95 backdrop-blur-md px-5 py-4 sticky top-[73px] z-[90] border-b border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <button onclick="history.back()" class="text-slate-400 hover:text-slate-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <h1 id="mission-page-title" class="text-xl font-900 text-[#0A1931]">紐⑤뱺 誘몄뀡</h1>
                </div>
                <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-3" id="region-filters"></div>
                <div class="flex gap-2 overflow-x-auto hide-scrollbar" id="category-filters"></div>
            </div>

            <div class="px-5 pt-4">
                <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-9 w-9 border-b-2 border-[#1E5128] mb-4"></div>
                    <p class="text-slate-400 font-700 text-sm">誘몄뀡??遺덈윭?ㅻ뒗 以?..</p>
                </div>
                <div id="mission-items" class="hidden"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/98 backdrop-blur-xl border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="Index.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span>誘몄뀡</span></a>
            <a href="Wishlist.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg><span>李?/span></a>
            <a href="History.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg><span>湲곕줉</span></a>
            <a href="Mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span>留덉씠</span></a>
        </nav>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-[#0A1931] text-white px-6 py-3 rounded-2xl font-800 text-sm z-[200] shadow-xl transition-all duration-300 opacity-0 pointer-events-none" style="transform: translate(-50%, -10px);">
        <span id="toast-msg"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const regions = ['?꾩껜', '?쒖슱', '寃쎄린', '媛뺤썝', '異⑹껌', '?꾨씪', '寃쎌긽', '?쒖＜'];
        const categories = ['?꾩껜', 'K-Food', 'Nature', 'History', 'K-Life'];
        let activeRegion = '?꾩껜';
        let activeCategory = '?꾩껜';

        function getWishlist() { try { return JSON.parse(localStorage.getItem('meogo_wishlist') || '[]'); } catch { return []; } }
        function saveWishlist(list) { localStorage.setItem('meogo_wishlist', JSON.stringify(list)); }
        function isWishlisted(id) { return getWishlist().some(w => w.mission_id === id); }

        function toggleWish(id, data) {
            let list = getWishlist();
            const idx = list.findIndex(w => w.mission_id === id);
            if (idx >= 0) { list.splice(idx, 1); showToast('李?紐⑸줉?먯꽌 ?쒓굅?덉뒿?덈떎.'); }
            else { list.push({...data, mission_id: id, wished_at: new Date().toISOString()}); showToast('李?紐⑸줉??異붽??덉뒿?덈떎! ?ㅿ툘'); }
            saveWishlist(list);
            renderMissions(window._data || []);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -10px)'; }, 2000);
        }

        async function fetchMissions() {
            document.getElementById('loading-spinner').classList.remove('hidden');
            document.getElementById('mission-items').classList.add('hidden');
            
            let query = _supabase.from('missions').select('*');
            if (activeRegion !== '?꾩껜') query = query.eq('region', activeRegion);
            if (activeCategory !== '?꾩껜') query = query.ilike('category', activeCategory);
            
            const { data } = await query;
            window._data = data || [];
            renderMissions(window._data);
        }

        function renderMissions(data) {
            document.getElementById('loading-spinner').classList.add('hidden');
            const container = document.getElementById('mission-items');
            container.classList.remove('hidden');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="py-20 text-center font-800 text-slate-400">議곌굔??留욌뒗 誘몄뀡???놁뒿?덈떎.</div>';
                return;
            }

            data.forEach(item => {
                const wished = isWishlisted(item.id);
                const card = document.createElement('div');
                card.className = 'mission-card';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="tag">${item.category}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-slate-400 font-900 uppercase tracking-widest">${item.region}</span>
                            <button onclick='handleWish("${item.id}", ${JSON.stringify(item).replace(/'/g, "&apos;")})' class="transition-transform active:scale-90">
                                ${wished ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-rose-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>'}
                            </button>
                        </div>
                    </div>
                    <h4 class="font-900 text-xl mb-2 text-[#0A1931]">${item.mission_name}</h4>
                    <p class="text-sm text-slate-500 mb-6 font-medium">${item.guide || '?쒓뎅???덈줈??紐⑥뒿??諛쒓껄?대낫?몄슂.'}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                        <span class="text-[#1E5128] font-900">?뭿 100P</span>
                        <button onclick="location.href='Quiz.html'" class="bg-brand-green text-white text-sm px-6 py-2.5 rounded-2xl font-900">誘몄뀡 ?쒖옉</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.handleWish = (id, data) => toggleWish(id, data);

        function renderFilters() {
            document.getElementById('region-filters').innerHTML = regions.map(r => `<button onclick="setRegion('${r}')" class="filter-chip ${activeRegion === r ? 'active' : ''}">${r}</button>`).join('');
            document.getElementById('category-filters').innerHTML = categories.map(c => `<button onclick="setCategory('${c}')" class="filter-chip ${activeCategory === c ? 'active' : ''}">${c}</button>`).join('');
        }

        function setRegion(r) { activeRegion = r; renderFilters(); fetchMissions(); }
        function setCategory(c) { activeCategory = c; renderFilters(); fetchMissions(); }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            activeRegion = p.get('value') || '?꾩껜';
            if (p.get('type') === 'category') { activeCategory = p.get('value'); activeRegion = '?꾩껜'; }
            renderFilters();
            fetchMissions();
        };
    </script>
</body>
</html>
