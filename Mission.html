<div id="mission-container" class="w-full">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .mission-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(10, 25, 49, 0.03); }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #F1F8F5; color: #1E5128; text-transform: uppercase; }
        .filter-chip { flex-shrink: 0; padding: 0.5rem 1.1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: all 0.2s; white-space: nowrap; }
        .filter-chip.active { background: #1E5128; color: white; border-color: #1E5128; box-shadow: 0 4px 10px rgba(30, 81, 40, 0.2); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <div class="bg-white/95 backdrop-blur-md px-5 py-4 sticky top-[73px] z-[90] border-b border-slate-100 -mx-6 mb-4">
        <div class="flex items-center gap-2 mb-4">
            <h1 id="mission-page-title" class="text-xl font-900 text-[#0A1931]">전체 미션</h1>
        </div>
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-3" id="region-filters"></div>
        <div class="flex gap-2 overflow-x-auto hide-scrollbar" id="category-filters"></div>
    </div>

    <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
        <div class="animate-spin rounded-full h-9 w-9 border-b-2 border-[#1E5128] mb-4"></div>
        <p class="text-slate-400 font-700 text-sm">MeoGo 미션을 불러오는 중...</p>
    </div>
    <div id="mission-items" class="hidden px-1"></div>

    <script>
        // Supabase 설정 (기존 설정 유지)
        if (typeof _supabase === 'undefined') {
            const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co'; 
            const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
            window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        const regions = ['전체', '서울', '경기', '강원', '충청', '전라', '경상', '제주', '전국'];
        const categories = ['전체', 'Food', 'Nature', 'History', 'K-Life'];

        let currentType = 'region';
        let currentValue = '전체';

        // Index.html에서 호출할 초기화 함수
        window.initMissions = function(type, value) {
            currentType = type || 'region';
            currentValue = value || '전체';
            renderFilterUI();
            fetchMissions();
        };

        function renderFilterUI() {
            const regionContainer = document.getElementById('region-filters');
            const categoryContainer = document.getElementById('category-filters');

            if(!regionContainer || !categoryContainer) return;

            regionContainer.innerHTML = regions.map(r => `
                <button onclick="updateMissionFilter('region', '${r}')" class="filter-chip ${currentType === 'region' && currentValue === r ? 'active' : ''}">${r}</button>
            `).join('');

            categoryContainer.innerHTML = categories.map(c => `
                <button onclick="updateMissionFilter('category', '${c}')" class="filter-chip ${currentType === 'category' && currentValue === c ? 'active' : ''}">${c === '전체' ? '모든 카테고리' : c}</button>
            `).join('');

            document.getElementById('mission-page-title').innerText = currentValue === '전체' ? '전체 미션' : currentValue;
        }

        async function updateMissionFilter(type, value) {
            currentType = type;
            currentValue = value;
            renderFilterUI();
            await fetchMissions();
        }

        async function fetchMissions() {
            const spinner = document.getElementById('loading-spinner');
            const container = document.getElementById('mission-items');
            
            if(!spinner || !container) return;

            spinner.classList.remove('hidden');
            container.classList.add('hidden');
            container.innerHTML = '';

            // 쿼리 작성 (전체 선택 시 필터 제외)
            let query = _supabase.from('missions').select('*');
            
            if (currentValue !== '전체') {
                query = query.eq(currentType, currentValue);
            }
            
            const { data, error } = await query;
            
            spinner.classList.add('hidden');
            container.classList.remove('hidden');

            if (error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center flex flex-col items-center">
                        <span class="text-4xl mb-4">🔍</span>
                        <p class="text-slate-400 font-800">해당 조건의 미션이 없습니다.</p>
                    </div>`;
                return;
            }

            data.forEach(item => {
                const el = document.createElement('div');
                el.className = 'mission-card fade-in';
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="tag">${item.category}</span>
                        <span class="text-[10px] text-slate-400 font-900 uppercase tracking-widest">${item.region}</span>
                    </div>
                    <h4 class="font-900 text-xl mb-2 text-[#0A1931] leading-tight">${item.mission_name}</h4>
                    <p class="text-sm text-slate-500 leading-relaxed mb-6 font-medium">${item.guide || '한국의 고유한 문화를 체험할 수 있는 미션입니다.'}</p>
                    <div class="flex justify-between items-center pt-5 border-t border-slate-50">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 font-800 uppercase mb-0.5">Reward</span>
                            <span class="text-[#1E5128] font-900 text-lg">💎 100P</span>
                        </div>
                        <button onclick="acceptMission('${item.mission_id}')" class="bg-[#1E5128] text-white text-sm px-7 py-3 rounded-2xl font-900 shadow-lg shadow-[#1E5128]/10 active:scale-95 transition-all">도전하기</button>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function acceptMission(id) {
            alert('미션을 수락했습니다! 기록 탭에서 확인할 수 있습니다.');
        }

        // 단독 실행 시 초기화
        if (document.getElementById('mission-page-title')) {
            initMissions(currentType, currentValue);
        }
    </script>
</div>
