<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Quest - Missions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: calc(6rem + env(safe-area-inset-bottom)); }
        .mission-card { transition: transform 0.2s; }
        .mission-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="text-slate-900">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-safe">
        
        <!-- Top Language Bar -->
        <div class="bg-slate-900 px-6 py-2 flex justify-between items-center text-[10px] font-bold text-white/70">
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                <span data-i18n="server_status">SERVER ONLINE: SEOUL</span>
            </div>
            <div class="relative">
                <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-transparent border-none outline-none text-white cursor-pointer appearance-none pr-4">
                    <option value="ko" class="text-slate-900">🇰🇷 KOREAN</option>
                    <option value="en" class="text-slate-900">🇺🇸 ENGLISH</option>
                    <option value="jp" class="text-slate-900">🇯🇵 JAPANESE</option>
                </select>
                <span class="absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-[8px]">▼</span>
            </div>
        </div>

        <!-- Header -->
        <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-slate-100">
            <h1 class="text-xl font-black text-indigo-600 italic tracking-tighter">K-QUEST</h1>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase" data-i18n="my_points">My Points</p>
                    <p class="text-sm font-black text-slate-900">2,450 P</p>
                </div>
                <div class="w-9 h-9 rounded-full bg-slate-900 text-white flex items-center justify-center text-xs font-bold">JD</div>
            </div>
        </header>

        <!-- Search & Filter -->
        <div class="px-6 py-4">
            <div class="relative mb-6">
                <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="미션 검색..." class="w-full bg-white border border-slate-200 rounded-2xl py-3 pl-11 pr-4 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                <span class="absolute left-4 top-3.5 text-slate-300">🔍</span>
            </div>

            <!-- Region Tabs -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6">
                <button class="px-5 py-2 rounded-full bg-indigo-600 text-white shadow-lg text-xs font-bold whitespace-nowrap" data-i18n="seoul">서울 (Seoul)</button>
                <button class="px-5 py-2 rounded-full bg-white text-slate-400 border border-slate-100 text-xs font-bold whitespace-nowrap" data-i18n="gyeonggi">경기 (Gyeonggi)</button>
                <button class="px-5 py-2 rounded-full bg-white text-slate-400 border border-slate-100 text-xs font-bold whitespace-nowrap" data-i18n="all_regions">지역무관</button>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black text-slate-900 italic" data-i18n="available_quests">Available Quests</h2>
                <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">15 Missions</span>
            </div>

            <!-- Mission Cards List -->
            <div class="space-y-4">
                <div class="mission-card bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100 relative">
                    <div class="flex items-start gap-4">
                        <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center text-2xl">🍖</div>
                        <div class="flex-1 pr-10">
                            <span class="text-[9px] font-black px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 uppercase">Food</span>
                            <h3 class="font-bold text-sm mb-1 text-slate-900">Korean BBQ Master</h3>
                            <p class="text-[11px] text-slate-400 leading-relaxed" data-i18n="mission_1_desc">고깃집에서 직접 구워 쌈 싸먹기 도전</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation (통일된 하단 바) -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-2xl border-t border-slate-100 px-8 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-lg">
            <button onclick="location.href='index.html'" class="flex flex-col items-center text-slate-300">
                <span class="text-xl">🏠</span><span class="text-[10px] font-black mt-1" data-i18n="nav_home">홈</span>
            </button>
            <button class="flex flex-col items-center text-indigo-600">
                <span class="text-xl">📍</span><span class="text-[10px] font-black mt-1" data-i18n="nav_mission">미션</span>
            </button>
            <button class="flex flex-col items-center text-slate-300">
                <span class="text-xl">⭐</span><span class="text-[10px] font-black mt-1" data-i18n="nav_rank">랭킹</span>
            </button>
            <button onclick="location.href='history.html'" class="flex flex-col items-center text-slate-300">
                <span class="text-xl">📊</span><span class="text-[10px] font-black mt-1" data-i18n="nav_history">기록</span>
            </button>
        </nav>
    </div>

    <script>
        const translations = {
            ko: {
                server_status: "서버 온라인: 서울",
                my_points: "나의 포인트",
                search_placeholder: "미션 검색...",
                seoul: "서울 (Seoul)",
                gyeonggi: "경기 (Gyeonggi)",
                all_regions: "지역무관",
                available_quests: "수행 가능한 퀘스트",
                mission_1_desc: "고깃집에서 직접 구워 쌈 싸먹기 도전",
                nav_home: "홈", nav_mission: "미션", nav_history: "기록", nav_rank: "랭킹"
            },
            en: {
                server_status: "SERVER ONLINE: SEOUL",
                my_points: "MY POINTS",
                search_placeholder: "Search missions...",
                seoul: "Seoul",
                gyeonggi: "Gyeonggi",
                all_regions: "Anywhere",
                available_quests: "Available Quests",
                mission_1_desc: "Challenge: Wrap and eat BBQ yourself",
                nav_home: "Home", nav_mission: "Missions", nav_history: "History", nav_rank: "Rank"
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('selectedLang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang] && translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('selectedLang') || 'ko';
            document.getElementById('langSelect').value = savedLang;
            changeLanguage(savedLang);
        };
    </script>
</body>
</html>
